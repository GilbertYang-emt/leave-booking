<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>填假系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
.container{max-width:720px;margin:0 auto;padding:20px 16px 40px;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
h1{font-size:20px;font-weight:600;}
.sync-info{font-size:12px;color:#888;display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;}
.dot.syncing{background:#fbbf24;animation:blink 1s infinite;}
.dot.error{background:#f87171;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.tabs{display:flex;gap:4px;background:#e8e8e2;border-radius:12px;padding:4px;margin-bottom:20px;}
.tab{flex:1;padding:8px;font-size:14px;cursor:pointer;border:none;background:none;color:#666;border-radius:8px;font-weight:500;}
.tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.card{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:12px;border:1px solid #ebebeb;}
.section{margin-bottom:22px;}
.slabel{font-size:13px;color:#888;margin-bottom:8px;font-weight:500;display:flex;align-items:center;gap:6px;}
.person-row{display:flex;align-items:center;gap:10px;}
.rank{width:28px;height:28px;border-radius:50%;background:#f0f0ea;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#666;flex-shrink:0;}
.pname{flex:1;font-size:15px;font-weight:500;}
.ps{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;}
.ps-wait{background:#f0f0ea;color:#999;}
.ps-now{background:#dcfce7;color:#16a34a;}
.ps-done{background:#dbeafe;color:#1d4ed8;}
.ps-extra{background:#fef3c7;color:#d97706;}
.ps-skip{background:#fee2e2;color:#dc2626;}
.btn-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:#aaa;border-radius:8px;font-size:16px;}
.btn-icon:hover{background:#f5f5f0;color:#333;}
.btn{padding:7px 14px;font-size:13px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;color:#555;font-weight:500;}
.btn:hover{background:#f5f5f0;}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;width:100%;padding:12px;font-size:14px;}
.btn-primary:hover{background:#333;}
.btn-primary:disabled{opacity:.3;cursor:not-allowed;}
.btn-skip{background:#fff;color:#dc2626;border-color:#fca5a5;width:100%;padding:10px;font-size:14px;margin-top:8px;border-radius:10px;cursor:pointer;font-weight:500;}
.btn-skip:hover{background:#fef2f2;}
.btn-danger{border-color:#fca5a5;color:#dc2626;}
.btn-danger:hover{background:#fef2f2;}
.btn-excel{border-color:#6ee7b7;color:#059669;}
.btn-excel:hover{background:#f0fdf4;}
.add-row{display:flex;gap:8px;margin-top:8px;}
.add-row input,.add-row select{flex:1;}
input[type=text],input[type=number],select{padding:8px 12px;border:1px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;}
input:focus,select:focus{outline:none;border-color:#999;}
.info-box{background:#f5f5f0;border-radius:10px;padding:12px 16px;font-size:14px;color:#666;margin-bottom:12px;}
.info-hl{border-left:3px solid #16a34a;color:#15803d;background:#f0fdf4;font-weight:500;}
.info-warn{border-left:3px solid #f59e0b;color:#b45309;background:#fffbeb;}
.info-err{border-left:3px solid #ef4444;color:#dc2626;background:#fef2f2;}
.month-nav{display:flex;align-items:center;gap:12px;}
.month-nav span{flex:1;text-align:center;font-weight:600;font-size:16px;}
.batch-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.batch-row span{font-size:13px;color:#888;}
.quota-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.qh{font-size:11px;color:#bbb;text-align:center;padding:4px 0;}
.quota-cell{border-radius:8px;border:1px solid #ebebeb;padding:4px;display:flex;flex-direction:column;align-items:center;gap:2px;background:#fff;}
.quota-cell.empty{border:none;background:none;}
.ql{font-size:10px;color:#bbb;}
.qbtns{display:flex;gap:2px;align-items:center;}
.qbtn{width:20px;height:20px;border:1px solid #e0e0e0;border-radius:5px;background:none;cursor:pointer;font-size:12px;color:#888;display:flex;align-items:center;justify-content:center;}
.qbtn:hover{background:#f5f5f0;}
.qval{font-size:14px;font-weight:600;min-width:16px;text-align:center;}
.round-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.rstat{background:#f5f5f0;border-radius:10px;padding:10px 12px;text-align:center;}
.rstat-label{font-size:11px;color:#aaa;margin-bottom:4px;}
.rstat-val{font-size:20px;font-weight:700;}

/* 最後一輪勾選 */
.lr-check-list{display:flex;flex-direction:column;gap:6px;}
.lr-check-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f5f5f0;border-radius:10px;cursor:pointer;}
.lr-check-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#1a1a1a;}
.lr-check-row.checked{background:#f0fdf4;border:1px solid #bbf7d0;}
.lr-check-name{flex:1;font-size:14px;font-weight:500;}
.lr-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#dbeafe;color:#1d4ed8;}
.lr-count{font-size:13px;margin-top:8px;padding:8px 12px;border-radius:8px;background:#f5f5f0;color:#666;}
.lr-count.ok{background:#f0fdf4;color:#16a34a;font-weight:500;}
.lr-count.err{background:#fef2f2;color:#dc2626;font-weight:500;}

/* 額外插入 */
.extras-table{display:flex;flex-direction:column;gap:6px;}
.extra-round-row{background:#f5f5f0;border-radius:10px;padding:10px 14px;}
.extra-round-label{font-size:13px;font-weight:600;margin-bottom:6px;}
.extra-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.echip{font-size:12px;padding:3px 10px;border-radius:20px;background:#fef3c7;color:#92400e;display:flex;align-items:center;gap:5px;border:1px solid #fde68a;}
.echip button{border:none;background:none;cursor:pointer;font-size:13px;color:#d97706;line-height:1;}
.add-extra-row{display:flex;gap:6px;align-items:center;}
.add-extra-row select{flex:1;}
.add-extra-btn{padding:6px 12px;font-size:12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#555;white-space:nowrap;}
.add-extra-btn:hover{background:#f5f5f0;}

/* 日曆 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dh{font-size:11px;color:#bbb;text-align:center;padding:4px 0;}
.day{border-radius:10px;border:1px solid #ebebeb;display:flex;flex-direction:column;align-items:center;padding:4px 2px;min-height:62px;cursor:default;}
.day.empty{border:none;}
.day.avail{background:#fff;cursor:pointer;}
.day.avail:hover{border-color:#999;}
.day.sel{background:#dbeafe;border-color:#3b82f6;cursor:pointer;}
.day.full{background:#f0fdf4;border-color:#bbf7d0;}
.day.locked{background:#f5f5f0;opacity:.45;}
.day.zero{opacity:.2;}
.dnum{font-weight:600;font-size:13px;}
.dslot{font-size:10px;color:#aaa;margin-top:1px;}
.dnames{display:flex;flex-direction:column;align-items:center;gap:1px;margin-top:2px;width:100%;}
.nchip{font-size:9px;padding:1px 3px;border-radius:4px;background:#dbeafe;color:#1d4ed8;width:90%;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nchip.extra{background:#fef3c7;color:#92400e;}
.legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.legend span{font-size:12px;color:#888;display:flex;align-items:center;gap:4px;}
.dsq{width:10px;height:10px;border-radius:3px;display:inline-block;}
.selected-display{font-size:15px;font-weight:500;padding:10px 0;}
.selected-display.empty{color:#bbb;font-weight:400;font-size:14px;}
.confirm-area{margin-top:16px;}
.metric{background:#f5f5f0;border-radius:10px;padding:14px;}
.metric-label{font-size:12px;color:#888;margin-bottom:4px;}
.metric-val{font-size:26px;font-weight:600;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.history-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0ea;}
.history-row:last-child{border-bottom:none;}
.tnum{font-size:12px;color:#bbb;min-width:28px;}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.divider{height:1px;background:#f0f0ea;margin:16px 0;}
.loading{text-align:center;padding:60px 20px;color:#aaa;font-size:15px;}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📅 填假系統</h1>
    <div class="sync-info"><div class="dot" id="sync-dot"></div><span id="sync-label">連線中…</span></div>
  </header>
  <div id="app"><div class="loading">載入中…</div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SUPABASE_URL='https://qndharkdfljpimotwxyw.supabase.co';
const SUPABASE_KEY='sb_publishable_ChkGurobbu_stwogESrIgA_W6mQqaBQ';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const DAYS=['日','一','二','三','四','五','六'];
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const now=new Date();

let state={
  tab:'admin',
  people:[],
  year:now.getFullYear(),
  month:now.getMonth(),
  dailyMax:{},
  bookings:{},
  turnIndex:0,
  history:[],
  lastRoundSelected:[],  // 勾選的人員 indices（最後一輪）
  roundExtras:{},
  skips:[],              // [{turn,pi,y,m}]
  lastRoundSubstitutions:0, // 最後一輪遞補次數
  selectedDay:null,
  loading:true,
};

function setSS(s){
  const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');
  if(!d)return;
  d.className='dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  l.textContent=s==='ok'?'已同步':s==='syncing'?'同步中…':'連線失敗';
}

async function loadDB(){
  setSS('syncing');
  try{
    const{data:settings}=await sb.from('settings').select('*');
    if(settings){
      for(const r of settings){
        if(r.key==='people') state.people=r.value;
        if(r.key==='dailyMax') state.dailyMax=r.value;
        if(r.key==='turnIndex') state.turnIndex=r.value;
        if(r.key==='year') state.year=r.value;
        if(r.key==='month') state.month=r.value;
        if(r.key==='lastRoundSelected') state.lastRoundSelected=r.value;
        if(r.key==='roundExtras') state.roundExtras=r.value;
        if(r.key==='skips') state.skips=r.value;
        if(r.key==='lastRoundSubstitutions') state.lastRoundSubstitutions=r.value||0;
      }
    }
    if(!state.people.length) state.people=['張小明','李美玲','王大偉','陳雅琪','林志豪'];

    const{data:bks}=await sb.from('bookings').select('*');
    state.bookings={};state.history=[];
    if(bks){
      for(const b of bks){
        const k=bk(b.year,b.month,b.day);
        if(!state.bookings[k])state.bookings[k]=[];
        state.bookings[k].push({pi:b.person_index,type:b.entry_type||'regular'});
        state.history.push({turn:b.turn_number,pi:b.person_index,y:b.year,m:b.month,d:b.day,type:b.entry_type||'regular',id:b.id});
      }
      state.history.sort((a,b2)=>a.turn-b2.turn);
    }
    state.loading=false;setSS('ok');
  }catch(e){setSS('error');state.loading=false;}
  render();
}

async function saveSetting(key,value){await sb.from('settings').upsert({key,value,updated_at:new Date().toISOString()});}
async function saveAll(){
  setSS('syncing');
  await Promise.all([
    saveSetting('people',state.people),
    saveSetting('dailyMax',state.dailyMax),
    saveSetting('turnIndex',state.turnIndex),
    saveSetting('year',state.year),
    saveSetting('month',state.month),
    saveSetting('lastRoundSelected',state.lastRoundSelected),
    saveSetting('roundExtras',state.roundExtras),
    saveSetting('skips',state.skips),
    saveSetting('lastRoundSubstitutions',state.lastRoundSubstitutions),
  ]);
  setSS('ok');
}

function getDIM(y,m){return new Date(y,m+1,0).getDate();}
function getFD(y,m){return new Date(y,m,1).getDay();}
function bk(y,m,d){return `${y}-${m}-${d}`;}
function getDM(y,m,d){const k=bk(y,m,d);return state.dailyMax[k]!==undefined?state.dailyMax[k]:1;}
function setDM(y,m,d,v){state.dailyMax[bk(y,m,d)]=Math.max(0,v);}
function getBookings(y,m,d){return state.bookings[bk(y,m,d)]||[];}
function countBooked(y,m,d){return getBookings(y,m,d).length;}
function getTotalSlots(){
  const dim=getDIM(state.year,state.month);
  let t=0;for(let d=1;d<=dim;d++)t+=getDM(state.year,state.month,d);return t;
}
function getRoundInfo(){
  const N=state.people.length;if(!N)return{full:0,rem:0,total:0,N:0,extraCount:0,reg:0};
  const total=getTotalSlots();
  let extraCount=0;
  Object.values(state.roundExtras).forEach(arr=>{extraCount+=(arr||[]).filter(i=>i<N).length;});
  const reg=Math.max(0,total-extraCount);
  const full=Math.floor(reg/N);
  const rem=reg%N;
  return{full,rem,total,N,extraCount,reg};
}

// lastRoundSelected = 勾選的 person indices，依 people 順序排列
function getLastRoundOrder(){
  const{N}=getRoundInfo();
  // 過濾掉無效 index，依 people 順序排
  return state.lastRoundSelected.filter(i=>i<N).sort((a,b)=>a-b);
}

function computeSequence(){
  const{full,rem,N}=getRoundInfo();
  if(!N)return[];
  const lro=getLastRoundOrder();
  const seq=[];
  for(let r=1;r<=full;r++){
    const extras=(state.roundExtras[r]||[]).filter(i=>i<N);
    for(const pi of extras) seq.push({pi,round:r,type:'extra'});
    for(let i=0;i<N;i++) seq.push({pi:i,round:r,type:'regular'});
  }
  if(rem>0){
    const r=full+1;
    const extras=(state.roundExtras[r]||[]).filter(i=>i<N);
    for(const pi of extras) seq.push({pi,round:r,type:'extra'});
    const effCount=Math.min(rem+(state.lastRoundSubstitutions||0),lro.length);
    for(let i=0;i<effCount;i++) seq.push({pi:lro[i],round:r,type:'regular'});
  }
  return seq;
}

function getCurrentEntry(){const seq=computeSequence();return state.turnIndex<seq.length?seq[state.turnIndex]:null;}
function currentFillerIdx(){const e=getCurrentEntry();return e?e.pi:-1;}
function currentFiller(){const i=currentFillerIdx();return i>=0?state.people[i]:'';}
function isCurrentExtra(){const e=getCurrentEntry();return e?e.type==='extra':false;}
function isAllDone(){return getCurrentEntry()===null;}

async function confirmFill(){
  const d=state.selectedDay;if(d===null)return;
  const entry=getCurrentEntry();if(!entry)return;
  const{pi,type}=entry;
  setSS('syncing');
  try{
    const{data,error}=await sb.from('bookings').insert({
      year:state.year,month:state.month,day:d,
      person_index:pi,turn_number:state.turnIndex+1,entry_type:type
    }).select();
    if(error)throw error;
    const k=bk(state.year,state.month,d);
    if(!state.bookings[k])state.bookings[k]=[];
    state.bookings[k].push({pi,type});
    state.history.push({turn:state.turnIndex+1,pi,y:state.year,m:state.month,d,type,id:data[0].id});
    state.turnIndex++;state.selectedDay=null;
    await saveAll();
  }catch(e){setSS('error');alert('儲存失敗，請確認網路後再試');}
  render();
}

async function confirmSkip(){
  const entry=getCurrentEntry();if(!entry)return;
  const{full,rem}=getRoundInfo();
  const totalRounds=full+(rem>0?1:0);
  const isLastRound=(entry.round===totalRounds&&rem>0&&entry.type==='regular');
  let subMsg='';
  let nextSub=null;
  if(isLastRound){
    // 找第一個未勾選的人遞補
    const unchecked=state.people.map((_,i)=>i).filter(i=>!state.lastRoundSelected.includes(i));
    if(unchecked.length>0){
      nextSub=unchecked[0];
      subMsg='\n\n⇒ 將由【'+state.people[nextSub]+'】自動遞補，維持填假格數。';
    }else{
      subMsg='\n\n⚠ 已無未勾選人員可遞補，此格將從最後一輪移除。';
    }
  }
  if(!confirm('確定要放棄這次填假嗎？順位將跳至下一位，且不佔用格子。'+subMsg))return;
  const{pi}=entry;
  state.skips.push({turn:state.turnIndex+1,pi,y:state.year,m:state.month});
  state.turnIndex++;state.selectedDay=null;
  // 最後一輪遞補
  if(isLastRound&&nextSub!==null){
    state.lastRoundSelected.push(nextSub);
    state.lastRoundSubstitutions=(state.lastRoundSubstitutions||0)+1;
  }
  setSS('syncing');
  await saveAll();
  render();
}

async function resetMonth(){
  if(!confirm('確定要重置本月所有填假資料嗎？'))return;
  setSS('syncing');
  try{
    await sb.from('bookings').delete().eq('year',state.year).eq('month',state.month);
    const prefix=state.year+'-'+state.month+'-';
    Object.keys(state.bookings).forEach(k=>{if(k.startsWith(prefix))delete state.bookings[k];});
    state.history=state.history.filter(h=>!(h.y===state.year&&h.m===state.month));
    state.skips=state.skips.filter(s=>!(s.y===state.year&&s.m===state.month));
    state.turnIndex=0;state.selectedDay=null;state.lastRoundSubstitutions=0;
    await saveAll();setSS('ok');
  }catch(e){setSS('error');}
  render();
}

function render(){
  document.getElementById('app').innerHTML=state.loading?'<div class="loading">載入中…</div>':buildHTML();
  if(!state.loading)bindEvents();
}

function buildHTML(){
  return`<div class="tabs">
    <button class="tab ${state.tab==='admin'?'active':''}" data-tab="admin">管理設定</button>
    <button class="tab ${state.tab==='fill'?'active':''}" data-tab="fill">填假</button>
    <button class="tab ${state.tab==='view'?'active':''}" data-tab="view">總覽</button>
  </div>${state.tab==='admin'?buildAdmin():state.tab==='fill'?buildFill():buildView()}`;
}

function buildAdmin(){
  const y=state.year,m=state.month;
  const dim=getDIM(y,m),fd=getFD(y,m);
  const{full,rem,total,N,extraCount,reg}=getRoundInfo();
  const lro=getLastRoundOrder();

  // 每日格數
  let qc='';
  for(let i=0;i<fd;i++) qc+=`<div class="quota-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const v=getDM(y,m,d);
    qc+=`<div class="quota-cell"><div class="ql">${d}</div><div class="qbtns">
      <button class="qbtn" data-qd="${d}" data-delta="-1">−</button>
      <span class="qval">${v}</span>
      <button class="qbtn" data-qd="${d}" data-delta="1">＋</button>
    </div></div>`;
  }

  // 最後一輪：勾選 UI
  let lastRoundHTML='';
  if(rem>0){
    const match=lro.length===rem;
    lastRoundHTML=`<div class="section">
      <div class="slabel"><i class="ti ti-checkbox" style="font-size:15px;"></i>最後一輪參與人員 <span style="font-size:12px;color:#aaa;font-weight:400;">（需勾選 ${rem} 人）</span></div>
      <div class="lr-check-list">
        ${state.people.map((p,i)=>{
          const checked=state.lastRoundSelected.includes(i);
          const origSelected=state.lastRoundSelected.slice(0,lro.length-(state.lastRoundSubstitutions||0)).includes(i);
          const isSub=checked&&!origSelected;
          return`<label class="lr-check-row ${checked?'checked':''}" style="user-select:none;">
            <input type="checkbox" data-lrcheck="${i}" ${checked?'checked':''}>
            <span class="lr-check-name">${p}</span>
            ${isSub?'<span class="lr-badge" style="background:#fef3c7;color:#92400e;border:1px solid #fde68a;">⇒ 遞補</span>':checked?'<span class="lr-badge">✓ 填</span>':''}
          </label>`;
        }).join('')}
      </div>
      ${(state.lastRoundSubstitutions||0)>0?`<div class="info-box info-warn" style="margin-top:8px;font-size:13px;">已發生 ${state.lastRoundSubstitutions} 次遞補，原始需要 ${rem} 人，目前序列共 ${Math.min(rem+(state.lastRoundSubstitutions||0),lro.length)} 人。</div>`:''}
      <div class="lr-count ${match?'ok':lro.length>0?'err':''}">
        已勾選 ${lro.length} 人 / 需要 ${rem} 人　${match?'✓ 正確':lro.length>rem?'⚠ 勾選太多':'⚠ 勾選不足'}
      </div>
    </div>`;
  }

  // 額外插入
  const totalRounds=full+(rem>0?1:0);
  let extrasHTML='';
  if(totalRounds>0){
    extrasHTML=`<div class="section">
      <div class="slabel"><i class="ti ti-user-plus" style="font-size:15px;"></i>各輪額外插入 <span style="font-size:12px;color:#aaa;font-weight:400;">（在某輪開始前，讓指定人員額外填一格）</span></div>
      <div class="extras-table">
        ${Array.from({length:totalRounds},(_,ri)=>{
          const r=ri+1;
          const extras=(state.roundExtras[r]||[]).filter(pi=>pi<N);
          const isLast=r===totalRounds&&rem>0;
          return`<div class="extra-round-row">
            <div class="extra-round-label">第 ${r} 輪前${isLast?' <span style="font-size:11px;color:#aaa;">（最後一輪）</span>':''}</div>
            <div class="extra-chips">
              ${extras.length===0?'<span style="font-size:12px;color:#bbb;">無額外插入</span>':
                extras.map((pi,ei)=>`<div class="echip">${state.people[pi]}<button data-erround="${r}" data-erei="${ei}">×</button></div>`).join('')}
            </div>
            <div class="add-extra-row">
              <select id="esel-${r}">${state.people.map((p,pi)=>`<option value="${pi}">${p}</option>`).join('')}</select>
              <button class="add-extra-btn" data-addextra="${r}">＋ 新增</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return`
  <div class="section">
    <div class="slabel">填假月份</div>
    <div class="card month-nav">
      <button class="btn-icon" id="prev-month"><i class="ti ti-chevron-left"></i></button>
      <span>${y} 年 ${MONTHS[m]}</span>
      <button class="btn-icon" id="next-month"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div class="section">
    <div class="slabel">每日可填格數</div>
    <div class="batch-row">
      <span>批次設定全月為</span>
      <input type="number" id="batch-val" min="0" max="99" value="1" style="width:64px;">
      <span>格</span>
      <button class="btn" id="batch-apply">套用</button>
    </div>
    <div class="card" style="padding:12px;">
      <div class="quota-grid">${DAYS.map(d=>`<div class="qh">${d}</div>`).join('')}${qc}</div>
    </div>
  </div>
  <div class="section">
    <div class="slabel"><i class="ti ti-refresh" style="font-size:15px;"></i>輪次規劃</div>
    <div class="round-stats">
      <div class="rstat"><div class="rstat-label">總格數</div><div class="rstat-val">${total}</div></div>
      <div class="rstat"><div class="rstat-label">額外插入</div><div class="rstat-val">${extraCount}</div></div>
      <div class="rstat"><div class="rstat-label">完整輪次</div><div class="rstat-val">${full}</div></div>
      <div class="rstat"><div class="rstat-label">最後一輪</div><div class="rstat-val">${rem>0?rem+'人':'—'}</div></div>
    </div>
    <div class="info-box" style="font-size:13px;margin-bottom:16px;">
      一般輪次格數：${total} − ${extraCount}（額外）＝ <strong>${reg}</strong> 格　→　${N} 人 × ${full} 輪${rem>0?' + 最後 '+rem+' 人':'，剛好整除'}
    </div>
    ${lastRoundHTML}
    ${extrasHTML}
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="slabel">填假人員順序（一般輪次）</div>
    ${state.people.map((p,i)=>`<div class="card person-row">
      <div class="rank">${i+1}</div>
      <span class="pname">${p}</span>
      <button class="btn-icon" data-up="${i}"><i class="ti ti-arrow-up"></i></button>
      <button class="btn-icon" data-down="${i}"><i class="ti ti-arrow-down"></i></button>
      <button class="btn-icon" data-del="${i}" style="color:#fca5a5;"><i class="ti ti-trash"></i></button>
    </div>`).join('')}
    <div class="add-row">
      <input type="text" id="new-person" placeholder="新增人員姓名">
      <button class="btn" id="add-person">新增</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <button class="btn btn-danger" id="reset-btn">重置本月資料</button>
    <span style="font-size:12px;color:#aaa;"><i class="ti ti-cloud" style="vertical-align:-2px;"></i> 設定自動同步至雲端</span>
  </div>`;
}

function buildFill(){
  const y=state.year,m=state.month;
  const dim=getDIM(y,m),fd=getFD(y,m);
  const entry=getCurrentEntry();
  const done=isAllDone();
  const name=done?'':currentFiller();
  const isExtra=isCurrentExtra();
  const{full,rem}=getRoundInfo();
  const curRound=entry?entry.round:0;
  const totalRounds=full+(rem>0?1:0);

  let cells='';
  for(let i=0;i<fd;i++) cells+=`<div class="day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const mx=getDM(y,m,d),booked=countBooked(y,m,d);
    const bks=getBookings(y,m,d);
    const isFull=booked>=mx&&mx>0,isSel=state.selectedDay===d;
    let cls='day',click=false;
    if(mx===0) cls+=' zero';
    else if(isSel){cls+=' sel';click=true;}
    else if(isFull) cls+=' full';
    else if(done) cls+=' locked';
    else{cls+=' avail';click=true;}
    const chips=bks.map(b=>`<div class="nchip ${b.type==='extra'?'extra':''}">${(state.people[b.pi]||'').slice(0,3)}</div>`).join('');
    cells+=`<div class="${cls}" ${click?'data-day="'+d+'"':''}>
      <div class="dnum">${d}</div>
      ${mx>0?`<div class="dslot">${booked}/${mx}</div>`:`<div class="dslot">休</div>`}
      ${chips?`<div class="dnames">${chips}</div>`:''}
    </div>`;
  }

  const statusBox=done
    ?`<div class="info-box info-hl">🎉 本月所有填假已完成！</div>`
    :isExtra
    ?`<div class="info-box info-warn">★ 額外插入：<strong>${name}</strong> 在第 ${curRound} 輪開始前先填一格</div>`
    :`<div class="info-box info-hl"><i class="ti ti-user-check" style="vertical-align:-2px;margin-right:6px;"></i>現在輪到：<strong>${name}</strong>（第 ${curRound}/${totalRounds} 輪${curRound===totalRounds&&rem>0?' · 最後一輪':''}）</div>`;

  return`${statusBox}
  <div class="section">
    <div class="slabel">${y} 年 ${MONTHS[m]} — 每人每次選一格</div>
    <div class="cal-grid">${DAYS.map(d=>`<div class="dh">${d}</div>`).join('')}${cells}</div>
    <div class="legend">
      <span><div class="dsq" style="background:#dbeafe;border:1px solid #93c5fd;"></div>一般填假</span>
      <span><div class="dsq" style="background:#fef3c7;border:1px solid #fde68a;"></div>額外插入</span>
      <span><div class="dsq" style="background:#f0fdf4;border:1px solid #bbf7d0;"></div>額滿</span>
    </div>
  </div>
  ${!done?`<div class="confirm-area">
    <div class="slabel">已選擇</div>
    <div class="selected-display ${state.selectedDay===null?'empty':''}">
      ${state.selectedDay!==null?`${m+1}/${state.selectedDay}（${DAYS[new Date(y,m,state.selectedDay).getDay()]}）`:'尚未選擇，請點選日曆'}
    </div>
    <button class="btn-primary" id="confirm-fill" ${state.selectedDay===null?'disabled':''}>
      確認填假 — ${name}${isExtra?' ★ 額外':''}
    </button>
    <button class="btn-skip" id="confirm-skip">
      <i class="ti ti-user-x" style="vertical-align:-2px;margin-right:4px;"></i>放棄填假（跳過 ${name}，不佔格子）
    </button>
  </div>`:''}`;
}

function buildView(){
  const y=state.year,m=state.month;
  const dim=getDIM(y,m);
  const total=Array.from({length:dim},(_,i)=>getDM(y,m,i+1)).reduce((a,b)=>a+b,0);
  const used=Array.from({length:dim},(_,i)=>countBooked(y,m,i+1)).reduce((a,b)=>a+b,0);
  const mh=state.history.filter(h=>h.y===y&&h.m===m);
  const ms=state.skips.filter(s=>s.y===y&&s.m===m);
  const entry=getCurrentEntry();
  const ci=currentFillerIdx();

  // 合併 history + skips 依 turn 排序
  const allEvents=[
    ...mh.map(h=>({...h,event:'fill'})),
    ...ms.map(s=>({turn:s.turn,pi:s.pi,event:'skip'}))
  ].sort((a,b)=>a.turn-b.turn);

  return`<div class="top-actions">
    <button class="btn" id="refresh-btn"><i class="ti ti-refresh" style="vertical-align:-2px;margin-right:4px;"></i>重新整理</button>
    <button class="btn btn-excel" id="export-excel"><i class="ti ti-file-spreadsheet" style="vertical-align:-2px;margin-right:4px;"></i>匯出 Excel</button>
  </div>
  <div class="grid2">
    <div class="metric"><div class="metric-label">總可填格數</div><div class="metric-val">${total}</div></div>
    <div class="metric"><div class="metric-label">已填格數</div><div class="metric-val">${used}</div></div>
  </div>
  <div class="section">
    <div class="slabel">人員填假天數</div>
    ${state.people.map((p,i)=>{
      const days=mh.filter(h=>h.pi===i&&h.type==='regular').length;
      const extras=mh.filter(h=>h.pi===i&&h.type==='extra').length;
      const skipped=ms.filter(s=>s.pi===i).length;
      let sl,sc;
      if(entry&&i===ci){sl=isCurrentExtra()?'額外插入中':'目前輪到';sc=isCurrentExtra()?'ps-extra':'ps-now';}
      else if(days>0||extras>0){
        sl=days+'天'+(extras>0?' +'+extras+'額外':'')+(skipped>0?' (放棄'+skipped+')':'');sc='ps-done';
      }else if(skipped>0){sl='放棄 '+skipped+' 次';sc='ps-skip';}
      else{sl='等待中';sc='ps-wait';}
      return`<div class="card person-row"><div class="rank">${i+1}</div><span class="pname">${p}</span><span class="ps ${sc}">${sl}</span></div>`;
    }).join('')}
  </div>
  <div class="section">
    <div class="slabel">填假歷程</div>
    ${allEvents.length===0?'<div class="info-box">尚無紀錄</div>':
      `<div class="card" style="padding:10px 16px;">
        ${allEvents.map(ev=>{
          if(ev.event==='skip') return`<div class="history-row">
            <span class="tnum">#${ev.turn}</span>
            <span style="font-weight:500;min-width:64px;color:#dc2626;">${state.people[ev.pi]}</span>
            <span style="color:#dc2626;font-size:14px;">放棄填假</span>
            <span class="ps ps-skip" style="margin-left:auto;">跳過</span>
          </div>`;
          return`<div class="history-row">
            <span class="tnum">#${ev.turn}</span>
            <span style="font-weight:500;min-width:64px;">${state.people[ev.pi]}</span>
            <span style="color:#888;font-size:14px;">${ev.m+1}/${ev.d}（${DAYS[new Date(ev.y,ev.m,ev.d).getDay()]}）</span>
            ${ev.type==='extra'?'<span class="ps ps-extra" style="margin-left:auto;">額外</span>':''}
          </div>`;
        }).join('')}
      </div>`}
  </div>`;
}

function bindEvents(){
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{state.tab=t.dataset.tab;state.selectedDay=null;render();}));
  const pm=document.getElementById('prev-month');
  if(pm)pm.addEventListener('click',async()=>{if(state.month===0){state.month=11;state.year--;}else state.month--;state.selectedDay=null;await saveAll();render();});
  const nm=document.getElementById('next-month');
  if(nm)nm.addEventListener('click',async()=>{if(state.month===11){state.month=0;state.year++;}else state.month++;state.selectedDay=null;await saveAll();render();});

  document.querySelectorAll('[data-qd]').forEach(b=>b.addEventListener('click',async()=>{
    setDM(state.year,state.month,parseInt(b.dataset.qd),getDM(state.year,state.month,parseInt(b.dataset.qd))+parseInt(b.dataset.delta));
    render();await saveSetting('dailyMax',state.dailyMax);setSS('ok');
  }));
  const ba=document.getElementById('batch-apply');
  if(ba)ba.addEventListener('click',async()=>{
    const v=parseInt(document.getElementById('batch-val').value)||0;
    const dim=getDIM(state.year,state.month);
    for(let d=1;d<=dim;d++)setDM(state.year,state.month,d,v);
    render();await saveSetting('dailyMax',state.dailyMax);setSS('ok');
  });

  // 人員順序
  document.querySelectorAll('[data-up]').forEach(b=>b.addEventListener('click',async()=>{
    const i=parseInt(b.dataset.up);
    if(i>0){[state.people[i-1],state.people[i]]=[state.people[i],state.people[i-1]];render();await saveSetting('people',state.people);setSS('ok');}
  }));
  document.querySelectorAll('[data-down]').forEach(b=>b.addEventListener('click',async()=>{
    const i=parseInt(b.dataset.down);
    if(i<state.people.length-1){[state.people[i+1],state.people[i]]=[state.people[i],state.people[i+1]];render();await saveSetting('people',state.people);setSS('ok');}
  }));
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{
    state.people.splice(parseInt(b.dataset.del),1);render();await saveSetting('people',state.people);setSS('ok');
  }));
  const ab=document.getElementById('add-person');
  if(ab)ab.addEventListener('click',async()=>{
    const inp=document.getElementById('new-person');
    if(inp&&inp.value.trim()){state.people.push(inp.value.trim());inp.value='';render();await saveSetting('people',state.people);setSS('ok');}
  });

  // 最後一輪勾選
  document.querySelectorAll('[data-lrcheck]').forEach(cb=>cb.addEventListener('change',async()=>{
    const i=parseInt(cb.dataset.lrcheck);
    if(cb.checked){if(!state.lastRoundSelected.includes(i))state.lastRoundSelected.push(i);}
    else{state.lastRoundSelected=state.lastRoundSelected.filter(x=>x!==i);}
    render();await saveSetting('lastRoundSelected',state.lastRoundSelected);setSS('ok');
  }));

  // 額外插入
  document.querySelectorAll('[data-addextra]').forEach(b=>b.addEventListener('click',async()=>{
    const r=parseInt(b.dataset.addextra);
    const sel=document.getElementById('esel-'+r);if(!sel)return;
    const pi=parseInt(sel.value);
    if(!state.roundExtras[r])state.roundExtras[r]=[];
    state.roundExtras[r].push(pi);
    render();await saveSetting('roundExtras',state.roundExtras);setSS('ok');
  }));
  document.querySelectorAll('[data-erround]').forEach(b=>b.addEventListener('click',async()=>{
    const r=parseInt(b.dataset.erround),ei=parseInt(b.dataset.erei);
    state.roundExtras[r].splice(ei,1);
    render();await saveSetting('roundExtras',state.roundExtras);setSS('ok');
  }));

  // 填假
  document.querySelectorAll('[data-day]').forEach(c=>c.addEventListener('click',()=>{
    const d=parseInt(c.dataset.day);state.selectedDay=state.selectedDay===d?null:d;render();
  }));
  const cf=document.getElementById('confirm-fill');
  if(cf)cf.addEventListener('click',confirmFill);
  const cs=document.getElementById('confirm-skip');
  if(cs)cs.addEventListener('click',confirmSkip);

  // 總覽
  const rb=document.getElementById('reset-btn');
  if(rb)rb.addEventListener('click',resetMonth);
  const rfr=document.getElementById('refresh-btn');
  if(rfr)rfr.addEventListener('click',()=>{state.loading=true;render();loadDB();});
  const ee=document.getElementById('export-excel');
  if(ee)ee.addEventListener('click',exportExcel);
}

function exportExcel(){
  const y=state.year,m=state.month,dim=getDIM(y,m);
  const wb=XLSX.utils.book_new();
  const c1=[['日期','星期','已填人員（一般）','額外插入人員','已填格數','上限格數']];
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m,d).getDay();
    const bks=getBookings(y,m,d);
    const reg=bks.filter(b=>b.type==='regular').map(b=>state.people[b.pi]).join('、');
    const ext=bks.filter(b=>b.type==='extra').map(b=>state.people[b.pi]).join('、');
    c1.push([y+'/'+(m+1)+'/'+d,DAYS[dow],reg,ext,bks.length,getDM(y,m,d)]);
  }
  const ws1=XLSX.utils.aoa_to_sheet(c1);ws1['!cols']=[{wch:12},{wch:6},{wch:24},{wch:16},{wch:8},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws1,(m+1)+'月月曆');
  const mh=state.history.filter(h=>h.y===y&&h.m===m);
  const ms=state.skips.filter(s=>s.y===y&&s.m===m);
  const allEvents=[...mh.map(h=>({...h,event:'fill'})),...ms.map(s=>({turn:s.turn,pi:s.pi,event:'skip'}))].sort((a,b)=>a.turn-b.turn);
  const c2=[['順序','姓名','日期','星期','類型']];
  for(const ev of allEvents){
    if(ev.event==='skip') c2.push([ev.turn,state.people[ev.pi],'—','—','放棄']);
    else c2.push([ev.turn,state.people[ev.pi],ev.y+'/'+(ev.m+1)+'/'+ev.d,DAYS[new Date(ev.y,ev.m,ev.d).getDay()],ev.type==='extra'?'額外':'一般']);
  }
  const ws2=XLSX.utils.aoa_to_sheet(c2);ws2['!cols']=[{wch:8},{wch:10},{wch:12},{wch:6},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws2,'填假歷程');
  const c3=[['順序','姓名','填假天數','額外','放棄']];
  state.people.forEach((p,pi)=>{
    c3.push([pi+1,p,mh.filter(h=>h.pi===pi&&h.type==='regular').length,mh.filter(h=>h.pi===pi&&h.type==='extra').length,ms.filter(s=>s.pi===pi).length]);
  });
  const ws3=XLSX.utils.aoa_to_sheet(c3);ws3['!cols']=[{wch:6},{wch:10},{wch:10},{wch:8},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws3,'人員統計');
  XLSX.writeFile(wb,'填假紀錄_'+y+'年'+(m+1)+'月.xlsx');
}

loadDB();
</script>
</body>
</html>
