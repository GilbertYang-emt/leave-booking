<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* Extras */

.echip{font-size:12px;padding:3px 9px;border-radius:20px;background:#fef3c7;color:#92400e;display:flex;align-items:center;gap:4px;border:1px solid #fde68a;}
.echip button{border:none;background:none;cursor:pointer;font-size:13px;color:#d97706;line-height:1;}
.add-extra-row{display:flex;gap:6px;align-items:center;}
.add-extra-row select{flex:1;}
.add-extra-btn{padding:6px 11px;font-size:12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#555;white-space:nowrap;}
.add-extra-btn:hover{background:#f5f5f0;}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dh{font-size:11px;color:#bbb;text-align:center;padding:4px 0;}
.day{border-radius:9px;border:1px solid #ebebeb;display:flex;flex-direction:column;align-items:center;padding:3px 2px;min-height:58px;cursor:default;}
.day.empty{border:none;}

.day.full{background:#f0fdf4;border-color:#bbf7d0;}
.day.locked{background:#f5f5f0;opacity:.4;}

.dnum{font-weight:600;font-size:12px;}
.dslot{font-size:9px;color:#aaa;margin-top:1px;}
.dnames{display:flex;flex-direction:column;align-items:center;gap:1px;margin-top:2px;width:100%;}
.nchip{font-size:8px;padding:1px 2px;border-radius:3px;background:#dbeafe;color:#1d4ed8;width:90%;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nchip.extra{background:#fef3c7;color:#92400e;}
.nchip.stay{background:#ede9fe;color:#6d28d9;}
.legend{display:flex;gap:10px;margin-top:7px;flex-wrap:wrap;}
.legend span{font-size:11px;color:#888;display:flex;align-items:center;gap:3px;}

.selected-display.empty{color:#bbb;font-weight:400;font-size:13px;}
.confirm-area{margin-top:14px;}

.metric-label{font-size:12px;color:#888;margin-bottom:3px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}

.history-row:last-child{border-bottom:none;}

.lt-section-title{font-size:13px;font-weight:600;padding:6px 0;border-bottom:1px solid #f0f0ea;margin-bottom:10px;color:#555;}

<body>
<div class="container">
  <header>
    <h1>📅 填假系統</h1>
    <div class="sync-info"><div class="dot" id="sync-dot"></div><span id="sync-label">連線中…</span></div>
  </header>
  <div id="app"><div class="loading">載入中…</div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SURL='https://qndharkdfljpimotwxyw.supabase.co';
const SKEY='sb_publishable_ChkGurobbu_stwogESrIgA_W6mQqaBQ';
const sb=supabase.createClient(SURL,SKEY);
const DAYS=['日','一','二','三','四','五','六'];
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const now=new Date();

// ── State ──
function defD(){return{dailyMax:{},bookings:{},turnIndex:0,lastRoundSelected:[],lastRoundStandby:[],lastRoundSubs:0,roundExtras:{},skips:[],history:[]};}
function defSh(){return{people:[],leave:defD(),stay:defD()};}

let state={tab:'admin',shift:'A',leaveType:'leave',year:now.getFullYear(),month:now.getMonth(),selectedDay:null,loading:true,A:defSh(),B:defSh()};

function ss(){return state[state.shift];}
function sd(){return state[state.shift][state.leaveType];}
function D(sh,lt){return state[sh][lt];}

// ── Sync UI ──
function setSS(s){
  const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');
  if(!d)return;
  d.className='dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  l.textContent=s==='ok'?'已同步':s==='syncing'?'同步中…':'連線失敗';
}

// ── DB ──
async function loadDB(){
  setSS('syncing');
  try{
    const{data:settings}=await sb.from('settings').select('*');
    if(settings){
      for(const r of settings){
        if(r.key==='year')state.year=r.value;
        if(r.key==='month')state.month=r.value;
        for(const sh of['A','B']){
          if(r.key===sh+'_people')state[sh].people=r.value||[];
          for(const lt of['leave','stay']){
            const p=sh+'_'+lt+'_';
            if(r.key===p+'dailyMax')D(sh,lt).dailyMax=r.value||{};
            if(r.key===p+'turnIndex')D(sh,lt).turnIndex=r.value||0;
            if(r.key===p+'lastRoundSelected')D(sh,lt).lastRoundSelected=r.value||[];
            if(r.key===p+'lastRoundStandby')D(sh,lt).lastRoundStandby=r.value||[];
            if(r.key===p+'lastRoundSubs')D(sh,lt).lastRoundSubs=r.value||0;
            if(r.key===p+'roundExtras')D(sh,lt).roundExtras=r.value||{};
            if(r.key===p+'skips')D(sh,lt).skips=r.value||[];
          }
        }
      }
    }
    for(const sh of['A','B']){
      if(!state[sh].people.length)state[sh].people=sh==='A'?['張小明','李美玲','王大偉']:['陳雅琪','林志豪'];
    }
    const{data:bks}=await sb.from('bookings').select('*');
    if(bks){
      for(const b of bks){
        const sh=b.shift||'A',lt=b.leave_type||'leave';
        const k=bk(b.year,b.month,b.day);
        if(!D(sh,lt).bookings[k])D(sh,lt).bookings[k]=[];
        D(sh,lt).bookings[k].push({pi:b.person_index,type:b.entry_type||'regular'});
        D(sh,lt).history.push({turn:b.turn_number,pi:b.person_index,y:b.year,m:b.month,d:b.day,type:b.entry_type||'regular',id:b.id});
      }
      for(const sh of['A','B'])for(const lt of['leave','stay'])D(sh,lt).history.sort((a,b2)=>a.turn-b2.turn);
    }
    // Init standby if empty
    for(const sh of['A','B'])for(const lt of['leave','stay']){
      const d=D(sh,lt),N=state[sh].people.length;
      if(!d.lastRoundStandby.length)d.lastRoundStandby=Array.from({length:N},(_,i)=>i).filter(i=>!d.lastRoundSelected.includes(i));
    }
    state.loading=false;setSS('ok');
  }catch(e){setSS('error');state.loading=false;}
  render();
}

async function saveSetting(k,v){await sb.from('settings').upsert({key:k,value:v,updated_at:new Date().toISOString()});}
async function saveShift(sh){
  setSS('syncing');
  const saves=[saveSetting(sh+'_people',state[sh].people),saveSetting('year',state.year),saveSetting('month',state.month)];
  for(const lt of['leave','stay']){
    const p=sh+'_'+lt+'_',d=D(sh,lt);
    saves.push(saveSetting(p+'dailyMax',d.dailyMax),saveSetting(p+'turnIndex',d.turnIndex),saveSetting(p+'lastRoundSelected',d.lastRoundSelected),saveSetting(p+'lastRoundStandby',d.lastRoundStandby),saveSetting(p+'lastRoundSubs',d.lastRoundSubs),saveSetting(p+'roundExtras',d.roundExtras),saveSetting(p+'skips',d.skips));
  }
  await Promise.all(saves);setSS('ok');
}

// ── Helpers ──
function getDIM(y,m){return new Date(y,m+1,0).getDate();}
function getFD(y,m){return new Date(y,m,1).getDay();}
function bk(y,m,d){return y+'-'+m+'-'+d;}
function getDM(sh,lt,d){const k=bk(state.year,state.month,d),v=D(sh,lt).dailyMax[k];return v!==undefined?v:1;}
function setDM(sh,lt,d,v){D(sh,lt).dailyMax[bk(state.year,state.month,d)]=Math.max(0,v);}
function getBks(sh,lt,d){return D(sh,lt).bookings[bk(state.year,state.month,d)]||[];}
function countBks(sh,lt,d){return getBks(sh,lt,d).length;}

function getTotalSlots(sh,lt){const dim=getDIM(state.year,state.month);let t=0;for(let d=1;d<=dim;d++)t+=getDM(sh,lt,d);return t;}

function getRoundInfo(sh,lt){
  const N=state[sh].people.length;if(!N)return{full:0,rem:0,total:0,N:0,extraCount:0,reg:0};
  const total=getTotalSlots(sh,lt);
  let extraCount=0;
  Object.values(D(sh,lt).roundExtras).forEach(arr=>{extraCount+=(arr||[]).filter(i=>i<N).length;});
  const reg=Math.max(0,total-extraCount);
  return{full:Math.floor(reg/N),rem:reg%N,total,N,extraCount,reg};
}

function getFillers(sh,lt){const d=D(sh,lt),{N}=getRoundInfo(sh,lt);return d.lastRoundSelected.filter(i=>i<N);}
function getStandby(sh,lt){const d=D(sh,lt),{N}=getRoundInfo(sh,lt),sel=d.lastRoundSelected;return d.lastRoundStandby.filter(i=>i<N&&!sel.includes(i));}

function computeSeq(sh,lt){
  const{full,rem,N}=getRoundInfo(sh,lt);if(!N)return[];
  const d=D(sh,lt),fillers=getFillers(sh,lt),seq=[];
  for(let r=1;r<=full;r++){
    const ex=(d.roundExtras[r]||[]).filter(i=>i<N);
    for(const pi of ex)seq.push({pi,round:r,type:'extra'});
    for(let i=0;i<N;i++)seq.push({pi:i,round:r,type:'regular'});
  }
  if(rem>0){
    const r=full+1,ex=(d.roundExtras[r]||[]).filter(i=>i<N);
    for(const pi of ex)seq.push({pi,round:r,type:'extra'});
    const eff=fillers.slice(0,rem+d.lastRoundSubs);
    for(const pi of eff)seq.push({pi,round:r,type:'regular'});
  }
  return seq;
}

function getCurEntry(sh,lt){const seq=computeSeq(sh,lt),ti=D(sh,lt).turnIndex;return ti<seq.length?seq[ti]:null;}
function canUndo(sh,lt){
  const d=D(sh,lt),mh=d.history.filter(h=>h.y===state.year&&h.m===state.month);
  if(!mh.length)return false;
  return d.turnIndex===mh[mh.length-1].turn;
}
function lastFill(sh,lt){const mh=D(sh,lt).history.filter(h=>h.y===state.year&&h.m===state.month);return mh.length?mh[mh.length-1]:null;}

// Anti-duplicate: same person can't have leave+stay on same day
function hasConflict(sh,lt,pi,day){
  const other=lt==='leave'?'stay':'leave';
  return getBks(sh,other,day).some(b=>b.pi===pi);
}

// ── Actions ──
async function confirmFill(){
  const day=state.selectedDay;if(day===null)return;
  const sh=state.shift,lt=state.leaveType;
  const entry=getCurEntry(sh,lt);if(!entry)return;
  const{pi,type}=entry;
  if(hasConflict(sh,lt,pi,day)){
    const oName=lt==='leave'?'外宿':'休假';
    alert(state[sh].people[pi]+' 在 '+(state.month+1)+'/'+day+' 已有'+oName+'紀錄，無法重複填假！');return;
  }
  setSS('syncing');
  try{
    const{data,error}=await sb.from('bookings').insert({year:state.year,month:state.month,day,person_index:pi,turn_number:D(sh,lt).turnIndex+1,entry_type:type,shift:sh,leave_type:lt}).select();
    if(error)throw error;
    const k=bk(state.year,state.month,day);
    if(!D(sh,lt).bookings[k])D(sh,lt).bookings[k]=[];
    D(sh,lt).bookings[k].push({pi,type});
    D(sh,lt).history.push({turn:D(sh,lt).turnIndex+1,pi,y:state.year,m:state.month,d:day,type,id:data[0].id});
    D(sh,lt).turnIndex++;state.selectedDay=null;
    await saveShift(sh);
  }catch(e){setSS('error');alert('儲存失敗，請重試');}
  render();
}

async function confirmSkip(){
  const sh=state.shift,lt=state.leaveType;
  const entry=getCurEntry(sh,lt);if(!entry)return;
  const{full,rem}=getRoundInfo(sh,lt);
  const totalR=full+(rem>0?1:0);
  const isLast=(entry.round===totalR&&rem>0&&entry.type==='regular');
  let subMsg='',nextSub=null;
  if(isLast){
    const sb2=getStandby(sh,lt);
    if(sb2.length>0){nextSub=sb2[0];subMsg='\n\n⇒ 將由【'+state[sh].people[nextSub]+'】自動遞補';}
    else subMsg='\n\n⚠ 已無備補人員可遞補';
  }
  if(!confirm('確定要放棄這次填假嗎？\n順位將跳至下一位，且不佔用格子。'+subMsg))return;
  const{pi}=entry;
  D(sh,lt).skips.push({turn:D(sh,lt).turnIndex+1,pi,y:state.year,m:state.month});
  D(sh,lt).turnIndex++;state.selectedDay=null;
  if(isLast&&nextSub!==null){
    D(sh,lt).lastRoundSelected.push(nextSub);
    D(sh,lt).lastRoundSubs=(D(sh,lt).lastRoundSubs||0)+1;
  }
  setSS('syncing');await saveShift(sh);render();
}

async function undoLast(){
  const sh=state.shift,lt=state.leaveType;
  if(!canUndo(sh,lt))return;
  const last=lastFill(sh,lt);
  if(!confirm('確定要收回【'+state[sh].people[last.pi]+' '+last.m+'/'+(last.d)+'】的填假紀錄嗎？\n下一位尚未填，可以反悔。'))return;
  setSS('syncing');
  try{
    await sb.from('bookings').delete().eq('id',last.id);
    const k=bk(last.y,last.m,last.d);
    if(D(sh,lt).bookings[k]){
      const idx=D(sh,lt).bookings[k].findIndex(b=>b.pi===last.pi&&b.type===last.type);
      if(idx>=0)D(sh,lt).bookings[k].splice(idx,1);
    }
    const hi=D(sh,lt).history.findIndex(h=>h.id===last.id);
    if(hi>=0)D(sh,lt).history.splice(hi,1);
    D(sh,lt).turnIndex--;state.selectedDay=null;
    await saveShift(sh);
  }catch(e){setSS('error');alert('撤銷失敗');}
  render();
}

async function resetMonth(sh,lt){
  const ltN=lt==='leave'?'休假':'外宿';
  if(!confirm('確定要重置 '+sh+'班 '+state.year+'年'+(state.month+1)+'月 '+ltN+' 的所有資料嗎？'))return;
  setSS('syncing');
  try{
    await sb.from('bookings').delete().eq('year',state.year).eq('month',state.month).eq('shift',sh).eq('leave_type',lt);
    const pre=state.year+'-'+state.month+'-';
    Object.keys(D(sh,lt).bookings).forEach(k=>{if(k.startsWith(pre))delete D(sh,lt).bookings[k];});
    D(sh,lt).history=D(sh,lt).history.filter(h=>!(h.y===state.year&&h.m===state.month));
    D(sh,lt).skips=D(sh,lt).skips.filter(s=>!(s.y===state.year&&s.m===state.month));
    D(sh,lt).turnIndex=0;D(sh,lt).lastRoundSubs=0;
    state.selectedDay=null;
    await saveShift(sh);
  }catch(e){setSS('error');}
  render();
}

// ── Admin ──
function buildLTSettings(sh,lt){
  const dim=getDIM(state.year,state.month),fd=getFD(state.year,state.month);
  const{full,rem,total,N,extraCount,reg}=getRoundInfo(sh,lt);
  const fillers=getFillers(sh,lt),standby=getStandby(sh,lt);
  const ltN=lt==='leave'?'休假':'外宿',ltColor=lt==='leave'?'#2563eb':'#7c3aed';

  // Quota grid
  let qc='';
  for(let i=0;i<fd;i++)qc+='<div class="quota-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const v=getDM(sh,lt,d);
    qc+='<div class="quota-cell"><div class="ql">'+d+'</div><div class="qbtns"><button class="qbtn" data-sh="'+sh+'" data-lt="'+lt+'" data-qd="'+d+'" data-delta="-1">−</button><span class="qval">'+v+'</span><button class="qbtn" data-sh="'+sh+'" data-lt="'+lt+'" data-qd="'+d+'" data-delta="1">＋</button></div></div>';
  }

  // Last round
  let lrHTML='';
  if(rem>0){
    const match=fillers.length===rem;
    const subsCount=D(sh,lt).lastRoundSubs||0;
    lrHTML='<div class="section"><div class="slabel">最後一輪參與人員 <span style="font-size:11px;color:#aaa;font-weight:400;">（勾選 '+rem+' 人）</span></div>'
      +'<div id="lrchecks-'+sh+'-'+lt+'">'
      +state[sh].people.map((p,i)=>{
        const checked=D(sh,lt).lastRoundSelected.includes(i);
        const isSub=checked&&subsCount>0&&!D(sh,lt).lastRoundSelected.slice(0,fillers.length-subsCount).includes(i);
        return '<label class="lr-check-row'+(checked?' checked':'')+'">'
          +'<input type="checkbox" data-lrsh="'+sh+'" data-lrlt="'+lt+'" data-lrpi="'+i+'"'+(checked?' checked':'')+'>'
          +'<span class="lr-check-name">'+p+'</span>'
          +(isSub?'<span class="sub-badge">⇒ 遞補</span>':checked?'<span class="ps ps-done">✓ 填</span>':'')
          +'</label>';
      }).join('')
      +'</div>'
      +'<div class="lr-count'+(match?' ok':fillers.length>0?' err':'')+'">已勾選 '+fillers.length+' 人 / 需要 '+rem+' 人　'+(match?'✓ 正確':fillers.length>rem?'⚠ 勾選太多':'⚠ 勾選不足')+'</div>'
      +(subsCount>0?'<div class="info-box info-warn" style="margin-top:8px;font-size:12px;">已發生 '+subsCount+' 次遞補</div>':'')
      +'<div class="lr-section"><div class="lr-sec-title">備補順序（拖曳排序）</div>'
      +'<div class="drag-list" id="standby-'+sh+'-'+lt+'">'
      +standby.map((pi,idx)=>'<div class="drag-item" data-drag-idx="'+idx+'" data-pi="'+pi+'"><span class="drag-handle ti ti-grip-vertical"></span><span class="dl-name">'+(idx+1)+'. '+state[sh].people[pi]+'</span></div>').join('')
      +(standby.length===0?'<div style="font-size:13px;color:#bbb;padding:8px;">無備補人員</div>':'')
      +'</div></div></div>';
  }

  // Round extras
  const totalR=full+(rem>0?1:0);
  let extHTML='';
  if(totalR>0){
    extHTML='<div class="section"><div class="slabel">各輪額外插入</div>'
      +Array.from({length:totalR},(_,ri)=>{
        const r=ri+1,ex=(D(sh,lt).roundExtras[r]||[]).filter(i=>i<N),isL=r===totalR&&rem>0;
        return '<div class="extra-round-row"><div class="extra-round-label">第 '+r+' 輪前'+(isL?' <span style="font-size:11px;color:#aaa;">（最後一輪）</span>':'')+'</div>'
          +'<div class="extra-chips">'+(ex.length===0?'<span style="font-size:12px;color:#bbb;">無額外插入</span>':ex.map((pi,ei)=>'<div class="echip">'+state[sh].people[pi]+'<button data-exsh="'+sh+'" data-exlt="'+lt+'" data-exr="'+r+'" data-exei="'+ei+'">×</button></div>').join(''))+'</div>'
          +'<div class="add-extra-row"><select id="esel-'+sh+'-'+lt+'-'+r+'">'+state[sh].people.map((p,pi)=>'<option value="'+pi+'">'+p+'</option>').join('')+'</select>'
          +'<button class="add-extra-btn" data-addexsh="'+sh+'" data-addexlt="'+lt+'" data-addexr="'+r+'">＋ 新增</button></div></div>';
      }).join('')+'</div>';
  }

  return '<div style="border-left:3px solid '+ltColor+';padding-left:10px;margin-bottom:14px;">'
    +'<div class="lt-section-title">'+ltN+'設定</div>'
    +'<div class="section"><div class="slabel">每日可填格數</div>'
    +'<div class="batch-row"><span>批次設定全月</span><input type="number" id="bv-'+sh+'-'+lt+'" min="0" max="99" value="1" style="width:56px;"><span>格</span><button class="btn" data-bapsh="'+sh+'" data-baplt="'+lt+'">套用</button></div>'
    +'<div class="card" style="padding:10px;"><div class="quota-grid">'+DAYS.map(d=>'<div class="qh">'+d+'</div>').join('')+qc+'</div></div></div>'
    +'<div class="section"><div class="slabel">輪次規劃</div>'
    +'<div class="round-stats"><div class="rstat"><div class="rstat-label">總格數</div><div class="rstat-val">'+total+'</div></div><div class="rstat"><div class="rstat-label">額外插入</div><div class="rstat-val">'+extraCount+'</div></div><div class="rstat"><div class="rstat-label">完整輪次</div><div class="rstat-val">'+full+'</div></div><div class="rstat"><div class="rstat-label">最後一輪</div><div class="rstat-val">'+(rem>0?rem+'人':'—')+'</div></div></div>'
    +'<div class="info-box" style="font-size:12px;">一般格數：'+total+' − '+extraCount+'（額外）＝ <strong>'+reg+'</strong> 格 → '+N+' 人 × '+full+' 輪'+(rem>0?' + 最後 '+rem+' 人':'，整除')+'</div></div>'
    +lrHTML+extHTML
    +'<div style="margin-bottom:14px;"><button class="btn btn-danger" data-resetsh="'+sh+'" data-resetlt="'+lt+'">重置'+ltN+'本月資料</button></div>'
    +'</div>';
}

  const sh=state.shift,y=state.year,m=state.month;
  return '<div class="section"><div class="slabel">填假月份</div>'
    +'<div class="card month-nav"><button class="btn-icon" id="prev-month"><i class="ti ti-chevron-left"></i></button><span>'+y+' 年 '+MONTHS[m]+'</span><button class="btn-icon" id="next-month"><i class="ti ti-chevron-right"></i></button></div></div>'

    +state[sh].people.map((p,i)=>'<div class="card person-row"><div class="rank">'+(i+1)+'</div><span class="pname">'+p+'</span><button class="btn-icon" data-up="'+i+'"><i class="ti ti-arrow-up"></i></button><button class="btn-icon" data-down="'+i+'"><i class="ti ti-arrow-down"></i></button><button class="btn-icon" data-del="'+i+'" style="color:#fca5a5;"><i class="ti ti-trash"></i></button></div>').join('')
    +'<div class="add-row"><input type="text" id="new-person" placeholder="新增人員姓名"><button class="btn" id="add-person">新增</button></div></div>';

// ── Fill ──
function buildFill(){
  const sh=state.shift,lt=state.leaveType,y=state.year,m=state.month;
  const dim=getDIM(y,m),fd=getFD(y,m);
  const entry=getCurEntry(sh,lt),done=!entry;
  const name=done?'':state[sh].people[entry.pi];
  const isExtra=entry&&entry.type==='extra';
  const{full,rem}=getRoundInfo(sh,lt);
  const totalR=full+(rem>0?1:0);
  const curRound=entry?entry.round:0;
  const hasUndo=canUndo(sh,lt),lastF=lastFill(sh,lt);

  let cells='';
  for(let i=0;i<fd;i++)cells+='<div class="day empty"></div>';
  for(let d=1;d<=dim;d++){
    const mx=getDM(sh,lt,d),booked=countBks(sh,lt,d),bks=getBks(sh,lt,d);
    const isFull=booked>=mx&&mx>0,isSel=state.selectedDay===d;
    // Check conflict for current filler
    const fillerPi=entry?entry.pi:-1;
    const isConflict=entry&&fillerPi>=0&&hasConflict(sh,lt,fillerPi,d);
    let cls='day',click=false;
    if(mx===0)cls+=' zero';
    else if(isConflict)cls+=' conflict';
    else if(isSel){cls+=' sel';click=true;}
    else if(isFull)cls+=' full';
    else if(done)cls+=' locked';
    else{cls+=' avail';click=true;}

    // Show names from current lt
    const chips=bks.map(b=>'<div class="nchip'+(b.type==='extra'?' extra':'')+(lt==='stay'?' stay':'')+'">'+((state[sh].people[b.pi]||'').slice(0,3))+'</div>').join('');
    cells+='<div class="'+cls+'"'+(click?' data-day="'+d+'"':'')+'>'
      +'<div class="dnum">'+d+'</div>'
      +(mx>0?'<div class="dslot">'+booked+'/'+mx+'</div>':'<div class="dslot">休</div>')
      +(chips?'<div class="dnames">'+chips+'</div>':'')
      +'</div>';
  }

  const ltN=lt==='leave'?'休假':'外宿';
  const statusBox=done
    ?'<div class="info-box info-hl">🎉 本月'+ltN+'填假已完成！</div>'
    :isExtra
    ?'<div class="info-box info-warn">★ 額外插入：<strong>'+name+'</strong> 在第 '+curRound+' 輪前先填</div>'
    :'<div class="info-box info-hl"><i class="ti ti-user-check" style="vertical-align:-2px;margin-right:5px;"></i>現在輪到：<strong>'+name+'</strong>（第 '+curRound+'/'+totalR+' 輪'+(curRound===totalR&&rem>0?' · 最後一輪':'')+'）</div>';

  return '<div class="lt-bar">'
    +'<button class="lt-btn'+(lt==='leave'?' active':'')+'" data-lt="leave">休假</button>'
    +'<button class="lt-btn'+(lt==='stay'?' active':'')+'" data-lt="stay">外宿</button>'
    +'</div>'
    +statusBox
    +'<div class="section"><div class="slabel">'+y+' 年 '+MONTHS[m]+' — '+ltN+'（每人每次一格）</div>'
    +'<div class="cal-grid">'+DAYS.map(d=>'<div class="dh">'+d+'</div>').join('')+cells+'</div>'
    +'<div class="legend">'
    +'<span><div class="dsq" style="background:#dbeafe;border:1px solid #93c5fd;"></div>已填</span>'
    +'<span><div class="dsq" style="background:#f0fdf4;border:1px solid #bbf7d0;"></div>額滿</span>'
    +'<span><div class="dsq" style="background:#fef2f2;border:1px solid #fca5a5;"></div>已有'+(lt==='leave'?'外宿':'休假')+'（不可填）</span>'
    +'</div></div>'
    +(!done?'<div class="confirm-area">'
      +'<div class="slabel">已選擇</div>'
      +'<div class="selected-display'+(state.selectedDay===null?' empty':'')+'">'+( state.selectedDay!==null?(m+1)+'/'+state.selectedDay+'（'+DAYS[new Date(y,m,state.selectedDay).getDay()]+'）':'尚未選擇，請點選日曆')+'</div>'
      +'<button class="btn-primary" id="confirm-fill"'+(state.selectedDay===null?' disabled':'')+'> 確認填假 — '+name+(isExtra?' ★ 額外':'')+'</button>'
      +'<button class="btn-skip" id="confirm-skip"><i class="ti ti-user-x" style="vertical-align:-2px;margin-right:4px;"></i>放棄填假（跳過 '+name+'，不佔格子）</button>'
      +(hasUndo&&lastF?'<button class="btn-undo" id="undo-fill"><i class="ti ti-arrow-back-up" style="vertical-align:-2px;margin-right:4px;"></i>反悔收回：'+state[sh].people[lastF.pi]+' '+(lastF.m+1)+'/'+lastF.d+'</button>':'')
      +'</div>':'');
}

// ── View ──
function buildView(){
  const sh=state.shift,y=state.year,m=state.month;
  let html='<div class="top-actions"><button class="btn" id="refresh-btn"><i class="ti ti-refresh" style="vertical-align:-2px;margin-right:4px;"></i>重新整理</button><button class="btn btn-excel" id="export-excel"><i class="ti ti-file-spreadsheet" style="vertical-align:-2px;margin-right:4px;"></i>匯出 Excel</button></div>';

  for(const lt of['leave','stay']){
    const ltN=lt==='leave'?'休假':'外宿',ltC=lt==='leave'?'#2563eb':'#7c3aed';
    const dim=getDIM(y,m);
    const total=Array.from({length:dim},(_,i)=>getDM(sh,lt,i+1)).reduce((a,b)=>a+b,0);
    const used=Array.from({length:dim},(_,i)=>countBks(sh,lt,i+1)).reduce((a,b)=>a+b,0);
    const mh=D(sh,lt).history.filter(h=>h.y===y&&h.m===m);
    const ms=D(sh,lt).skips.filter(s=>s.y===y&&s.m===m);
    const entry=getCurEntry(sh,lt),ci=entry?entry.pi:-1;

    html+='<div style="border-left:3px solid '+ltC+';padding-left:10px;margin-bottom:20px;">'
      +'<div class="lt-section-title">'+ltN+'</div>'
      +'<div class="grid2"><div class="metric"><div class="metric-label">總格數</div><div class="metric-val">'+total+'</div></div><div class="metric"><div class="metric-label">已填</div><div class="metric-val">'+used+'</div></div></div>'
      +'<div class="section"><div class="slabel">人員狀況</div>'
      +state[sh].people.map((p,i)=>{
        const days=mh.filter(h=>h.pi===i&&h.type==='regular').length;
        const ext=mh.filter(h=>h.pi===i&&h.type==='extra').length;
        const skipped=ms.filter(s=>s.pi===i).length;
        let sl,sc;
        if(entry&&i===ci){sl=entry.type==='extra'?'額外插入中':'目前輪到';sc=entry.type==='extra'?'ps-extra':'ps-now';}
        else if(days>0||ext>0){sl=days+'天'+(ext>0?' +'+ext+'額':'')+(skipped>0?' (棄'+skipped+')':'');sc='ps-done';}
        else if(skipped>0){sl='放棄'+skipped+'次';sc='ps-skip';}
        else{sl='等待中';sc='ps-wait';}
        return '<div class="card person-row"><div class="rank">'+(i+1)+'</div><span class="pname">'+p+'</span><span class="ps '+sc+'">'+sl+'</span></div>';
      }).join('')+'</div>';

    const allEv=[...mh.map(h=>({...h,ev:'fill'})),...ms.map(s=>({turn:s.turn,pi:s.pi,ev:'skip'}))].sort((a,b)=>a.turn-b.turn);
    html+='<div class="section"><div class="slabel">歷程</div>'
      +(allEv.length===0?'<div class="info-box">尚無紀錄</div>':'<div class="card" style="padding:8px 14px;">'
        +allEv.map(ev=>{
          if(ev.ev==='skip')return '<div class="history-row"><span class="tnum">#'+ev.turn+'</span><span style="font-weight:500;min-width:60px;color:#dc2626;">'+state[sh].people[ev.pi]+'</span><span style="color:#dc2626;font-size:13px;">放棄</span></div>';
          return '<div class="history-row"><span class="tnum">#'+ev.turn+'</span><span style="font-weight:500;min-width:60px;">'+state[sh].people[ev.pi]+'</span><span style="color:#888;font-size:13px;">'+(ev.m+1)+'/'+ev.d+'（'+DAYS[new Date(ev.y,ev.m,ev.d).getDay()]+'）</span>'+(ev.type==='extra'?'<span class="ps ps-extra" style="margin-left:auto;">額外</span>':'')+'</div>';
        }).join('')+'</div>')
      +'</div></div>';
  }
  return html;
}

// ── Events ──
function bindEvents(){
  const sh=state.shift;
  document.querySelectorAll('[data-shift]').forEach(b=>b.addEventListener('click',()=>{state.shift=b.dataset.shift;state.selectedDay=null;render();}));
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{state.tab=b.dataset.tab;state.selectedDay=null;render();}));
  document.querySelectorAll('[data-lt]').forEach(b=>b.addEventListener('click',()=>{state.leaveType=b.dataset.lt;state.selectedDay=null;render();}));

  const pm=document.getElementById('prev-month');
  if(pm)pm.addEventListener('click',async()=>{if(state.month===0){state.month=11;state.year--;}else state.month--;state.selectedDay=null;for(const s of['A','B'])await saveShift(s);render();});
  const nm=document.getElementById('next-month');
  if(nm)nm.addEventListener('click',async()=>{if(state.month===11){state.month=0;state.year++;}else state.month++;state.selectedDay=null;for(const s of['A','B'])await saveShift(s);render();});

  // Quota buttons
  document.querySelectorAll('[data-qd]').forEach(b=>b.addEventListener('click',async()=>{
    const bsh=b.dataset.sh,blt=b.dataset.lt,d=parseInt(b.dataset.qd),delta=parseInt(b.dataset.delta);
    setDM(bsh,blt,d,getDM(bsh,blt,d)+delta);
    render();await saveShift(bsh);
  }));
  document.querySelectorAll('[data-bapsh]').forEach(b=>b.addEventListener('click',async()=>{
    const bsh=b.dataset.bapsh,blt=b.dataset.baplt;
    const v=parseInt(document.getElementById('bv-'+bsh+'-'+blt).value)||0;
    const dim=getDIM(state.year,state.month);
    for(let d=1;d<=dim;d++)setDM(bsh,blt,d,v);
    render();await saveShift(bsh);
  }));

  // People order
  document.querySelectorAll('[data-up]').forEach(b=>b.addEventListener('click',async()=>{
    const i=parseInt(b.dataset.up);
    if(i>0){[state[sh].people[i-1],state[sh].people[i]]=[state[sh].people[i],state[sh].people[i-1]];render();await saveShift(sh);}
  }));
  document.querySelectorAll('[data-down]').forEach(b=>b.addEventListener('click',async()=>{
    const i=parseInt(b.dataset.down);
    if(i<state[sh].people.length-1){[state[sh].people[i+1],state[sh].people[i]]=[state[sh].people[i],state[sh].people[i+1]];render();await saveShift(sh);}
  }));
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{state[sh].people.splice(parseInt(b.dataset.del),1);render();await saveShift(sh);}));
  const ap=document.getElementById('add-person');
  if(ap)ap.addEventListener('click',async()=>{const inp=document.getElementById('new-person');if(inp&&inp.value.trim()){state[sh].people.push(inp.value.trim());inp.value='';render();await saveShift(sh);}});

  // Last round checkboxes
  document.querySelectorAll('[data-lrpi]').forEach(cb=>cb.addEventListener('change',async()=>{
    const bsh=cb.dataset.lrsh,blt=cb.dataset.lrlt,pi=parseInt(cb.dataset.lrpi);
    if(cb.checked){if(!D(bsh,blt).lastRoundSelected.includes(pi))D(bsh,blt).lastRoundSelected.push(pi);}
    else{D(bsh,blt).lastRoundSelected=D(bsh,blt).lastRoundSelected.filter(x=>x!==pi);}
    render();await saveShift(bsh);
  }));

  // Extras
  document.querySelectorAll('[data-addexsh]').forEach(b=>b.addEventListener('click',async()=>{
    const bsh=b.dataset.addexsh,blt=b.dataset.addexlt,r=parseInt(b.dataset.addexr);
    const sel=document.getElementById('esel-'+bsh+'-'+blt+'-'+r);if(!sel)return;
    const pi=parseInt(sel.value);
    if(!D(bsh,blt).roundExtras[r])D(bsh,blt).roundExtras[r]=[];
    D(bsh,blt).roundExtras[r].push(pi);
    render();await saveShift(bsh);
  }));
  document.querySelectorAll('[data-exsh]').forEach(b=>b.addEventListener('click',async()=>{
    const bsh=b.dataset.exsh,blt=b.dataset.exlt,r=parseInt(b.dataset.exr),ei=parseInt(b.dataset.exei);
    D(bsh,blt).roundExtras[r].splice(ei,1);
    render();await saveShift(bsh);
  }));
  document.querySelectorAll('[data-resetsh]').forEach(b=>b.addEventListener('click',()=>resetMonth(b.dataset.resetsh,b.dataset.resetlt)));

  // Fill tab
  document.querySelectorAll('[data-day]').forEach(c=>c.addEventListener('click',()=>{
    const d=parseInt(c.dataset.day);state.selectedDay=state.selectedDay===d?null:d;render();
  }));
  const cf=document.getElementById('confirm-fill');if(cf)cf.addEventListener('click',confirmFill);
  const cs=document.getElementById('confirm-skip');if(cs)cs.addEventListener('click',confirmSkip);
  const cu=document.getElementById('undo-fill');if(cu)cu.addEventListener('click',undoLast);

  // View
  const rfr=document.getElementById('refresh-btn');if(rfr)rfr.addEventListener('click',()=>{state.loading=true;render();loadDB();});
  const ee=document.getElementById('export-excel');if(ee)ee.addEventListener('click',exportExcel);
}

// ── Drag Sort ──
let _drag=null;
function setupDragLists(){
  document.querySelectorAll('.drag-list[id^="standby-"]').forEach(list=>{
    const id=list.id;
    const parts=id.split('-');// standby-A-leave or standby-B-stay
    const bsh=parts[1],blt=parts[2];
    setupDragList(list,bsh,blt);
  });
}
function setupDragList(container,bsh,blt){
  const handles=container.querySelectorAll('.drag-handle');
  handles.forEach(handle=>{
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      const item=handle.closest('.drag-item');
      if(!item)return;
      const items=[...container.querySelectorAll('.drag-item')];
      const fromIdx=items.indexOf(item);
      _drag={container,bsh,blt,fromIdx,item,items,toIdx:null};
      item.classList.add('dragging');
      document.addEventListener('mousemove',onDragMove);
      document.addEventListener('mouseup',onDragUp);
    });
  });
}
function onDragMove(e){
  if(!_drag)return;
  const{container,item,items}=_drag;
  items.forEach(it=>it.classList.remove('drag-over'));
  let toIdx=items.length;
  for(let i=0;i<items.length;i++){
    if(items[i]===item)continue;
    const rect=items[i].getBoundingClientRect();
    if(e.clientY<rect.top+rect.height/2){toIdx=i;break;}
  }
  _drag.toIdx=toIdx;
  if(toIdx<items.length)items[toIdx].classList.add('drag-over');
}
async function onDragUp(e){
  if(!_drag)return;
  const{container,bsh,blt,fromIdx,item,items,toIdx}=_drag;
  item.classList.remove('dragging');
  items.forEach(it=>it.classList.remove('drag-over'));
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragUp);
  _drag=null;
  if(toIdx===null||toIdx===fromIdx||toIdx===fromIdx+1)return;
  // Reorder lastRoundStandby
  const selected=D(bsh,blt).lastRoundSelected;
  const N=state[bsh].people.length;
  const standby=D(bsh,blt).lastRoundStandby.filter(i=>i<N&&!selected.includes(i));
  const moved=standby[fromIdx];
  standby.splice(fromIdx,1);
  const insertAt=toIdx>fromIdx?toIdx-1:toIdx;
  standby.splice(insertAt,0,moved);
  // Rebuild full standby array (preserve selected references)
  D(bsh,blt).lastRoundStandby=standby;
  render();await saveShift(bsh);
}

// ── Excel ──
function exportExcel(){
  const sh=state.shift,y=state.year,m=state.month,dim=getDIM(y,m);
  const wb=XLSX.utils.book_new();
  for(const lt of['leave','stay']){
    const ltN=lt==='leave'?'休假':'外宿';
    const c=[['日期','星期','一般填假人員','額外插入人員','已填','上限']];
    for(let d=1;d<=dim;d++){
      const dow=new Date(y,m,d).getDay(),bks=getBks(sh,lt,d);
      const reg=bks.filter(b=>b.type==='regular').map(b=>state[sh].people[b.pi]).join('、');
      const ext=bks.filter(b=>b.type==='extra').map(b=>state[sh].people[b.pi]).join('、');
      c.push([y+'/'+(m+1)+'/'+d,DAYS[dow],reg,ext,bks.length,getDM(sh,lt,d)]);
    }
    const ws=XLSX.utils.aoa_to_sheet(c);ws['!cols']=[{wch:12},{wch:6},{wch:24},{wch:14},{wch:6},{wch:6}];
    XLSX.utils.book_append_sheet(wb,ws,(m+1)+'月'+ltN);
  }
  // Summary sheet
  const sc=[['班別','類型','姓名','填假天數','額外','放棄']];
  for(const lt of['leave','stay']){
    const ltN=lt==='leave'?'休假':'外宿';
    const mh=D(sh,lt).history.filter(h=>h.y===y&&h.m===m);
    const ms=D(sh,lt).skips.filter(s=>s.y===y&&s.m===m);
    state[sh].people.forEach((p,pi)=>{
      sc.push([sh+'班',ltN,p,mh.filter(h=>h.pi===pi&&h.type==='regular').length,mh.filter(h=>h.pi===pi&&h.type==='extra').length,ms.filter(s=>s.pi===pi).length]);
    });
  }
  const ws2=XLSX.utils.aoa_to_sheet(sc);ws2['!cols']=[{wch:6},{wch:8},{wch:10},{wch:10},{wch:6},{wch:6}];
  XLSX.utils.book_append_sheet(wb,ws2,'人員統計');
  XLSX.writeFile(wb,'填假紀錄_'+sh+'班_'+y+'年'+(m+1)+'月.xlsx');
}

loadDB();
