/* Calendar */

<body>
<div class="container">
  <header>
    <h1>📅 填假系統</h1>
    <div class="sync-info"><div class="dot" id="sync-dot"></div><span id="sync-label">連線中…</span></div>
  </header>
  <div id="app"><div class="loading">載入中…</div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SURL='https://qndharkdfljpimotwxyw.supabase.co';
const SKEY='sb_publishable_ChkGurobbu_stwogESrIgA_W6mQqaBQ';
const sb=supabase.createClient(SURL,SKEY);
const DAYS=['日','一','二','三','四','五','六'];
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const now=new Date();

// ── State ──
// fillOrder, lastRoundOrder, standbyOrder, roundExtras all store NAMES (not indices)
// history.pi and bookings[k][].pi = index into fillOrder (stable as long as fillOrder doesn't change)
function defLT(){
  return {fillOrder:[],lastRoundOrder:[],standbyOrder:[],dailyMax:{},bookings:{},turnIndex:0,history:[],roundExtras:{},skips:[],lastRoundSubs:0};
}
function defSh(){return {people:[],leave:defLT(),stay:defLT()};}
let state={tab:'admin',shift:'A',leaveType:'leave',year:now.getFullYear(),month:now.getMonth(),selectedDay:null,loading:true,roster:[],A:defSh(),B:defSh()};

function ss(){return state[state.shift];}
function D(sh,lt){return state[sh][lt];}

// ── Sync ──
function setSS(s){
  const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');
  if(!d)return;
  d.className='dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  l.textContent=s==='ok'?'已同步':s==='syncing'?'同步中…':'連線失敗';
}

// ── DB ──
async function loadDB(){
  setSS('syncing');
  try{
    const{data:settings}=await sb.from('settings').select('*');
    if(settings){
      for(const r of settings){
        if(r.key==='year')state.year=r.value;
        if(r.key==='month')state.month=r.value;
        if(r.key==='roster')state.roster=r.value||[];
        for(const sh of['A','B']){
          if(r.key===sh+'_people')state[sh].people=r.value||[];
          for(const lt of['leave','stay']){
            const p=sh+'_'+lt+'_';
            if(r.key===p+'fillOrder')D(sh,lt).fillOrder=r.value||[];
            if(r.key===p+'lastRoundOrder')D(sh,lt).lastRoundOrder=r.value||[];
            if(r.key===p+'standbyOrder')D(sh,lt).standbyOrder=r.value||[];
            if(r.key===p+'dailyMax')D(sh,lt).dailyMax=r.value||{};
            if(r.key===p+'turnIndex')D(sh,lt).turnIndex=r.value||0;
            if(r.key===p+'roundExtras')D(sh,lt).roundExtras=r.value||{};
            if(r.key===p+'skips')D(sh,lt).skips=r.value||[];
            if(r.key===p+'lastRoundSubs')D(sh,lt).lastRoundSubs=r.value||0;
          }
        }
      }
    }
    // Defaults
    for(const sh of['A','B']){
      if(!state[sh].people.length)state[sh].people=sh==='A'?['張小明','李美玲','王大偉']:['陳雅琪','林志豪'];
      for(const lt of['leave','stay']){
        const d=D(sh,lt);
        if(!d.fillOrder.length)d.fillOrder=[...state[sh].people];
        if(!d.standbyOrder.length)d.standbyOrder=state[sh].people.filter(n=>!d.lastRoundOrder.includes(n));
      }
    }
    // Reset before reload to avoid duplicates
    for(const sh of['A','B'])for(const lt of['leave','stay']){D(sh,lt).bookings={};D(sh,lt).history=[];}
    // Load bookings (person_index = index into fillOrder)
    const{data:bks}=await sb.from('bookings').select('*');
    if(bks){
      for(const b of bks){
        const sh=b.shift||'A',lt=b.leave_type||'leave';
        const k=bk(b.year,b.month,b.day);
        if(!D(sh,lt).bookings[k])D(sh,lt).bookings[k]=[];
        D(sh,lt).bookings[k].push({pi:b.person_index,type:b.entry_type||'regular'});
        D(sh,lt).history.push({turn:b.turn_number,pi:b.person_index,y:b.year,m:b.month,d:b.day,type:b.entry_type||'regular',id:b.id});
      }
      for(const sh of['A','B'])for(const lt of['leave','stay'])D(sh,lt).history.sort((a,b2)=>a.turn-b2.turn);
    }
    state.loading=false;setSS('ok');
  }catch(e){setSS('error');state.loading=false;}
  render();
}

async function saveSetting(k,v){await sb.from('settings').upsert({key:k,value:v,updated_at:new Date().toISOString()});}
async function saveShift(sh){
  setSS('syncing');
  const saves=[saveSetting(sh+'_people',state[sh].people),saveSetting('year',state.year),saveSetting('month',state.month),saveSetting('roster',state.roster)];
  for(const lt of['leave','stay']){
    const p=sh+'_'+lt+'_',d=D(sh,lt);
    saves.push(
      saveSetting(p+'fillOrder',d.fillOrder),saveSetting(p+'lastRoundOrder',d.lastRoundOrder),
      saveSetting(p+'standbyOrder',d.standbyOrder),saveSetting(p+'dailyMax',d.dailyMax),
      saveSetting(p+'turnIndex',d.turnIndex),saveSetting(p+'roundExtras',d.roundExtras),
      saveSetting(p+'skips',d.skips),saveSetting(p+'lastRoundSubs',d.lastRoundSubs)
    );
  }
  await Promise.all(saves);setSS('ok');
}

// ── Helpers ──
function getDIM(y,m){return new Date(y,m+1,0).getDate();}
function getFD(y,m){return new Date(y,m,1).getDay();}
function bk(y,m,d){return y+'-'+m+'-'+d;}
function getDM(sh,lt,d){const k=bk(state.year,state.month,d),v=D(sh,lt).dailyMax[k];return v!==undefined?v:1;}
function setDM(sh,lt,d,v){D(sh,lt).dailyMax[bk(state.year,state.month,d)]=Math.max(0,v);}
function getBks(sh,lt,d){return D(sh,lt).bookings[bk(state.year,state.month,d)]||[];}
function countBks(sh,lt,d){return getBks(sh,lt,d).length;}
function nameAt(sh,lt,pi){return D(sh,lt).fillOrder[pi]||'';}
function getTotalSlots(sh,lt){const dim=getDIM(state.year,state.month);let t=0;for(let d=1;d<=dim;d++)t+=getDM(sh,lt,d);return t;}

function getRoundInfo(sh,lt){
  const N=D(sh,lt).fillOrder.length;if(!N)return{full:0,rem:0,total:0,N:0,extraCount:0,reg:0};
  const total=getTotalSlots(sh,lt);
  let extraCount=0;
  Object.values(D(sh,lt).roundExtras).forEach(arr=>{extraCount+=(arr||[]).length;});
  const reg=Math.max(0,total-extraCount);
  return{full:Math.floor(reg/N),rem:reg%N,total,N,extraCount,reg};
}

function computeSeq(sh,lt){
  const d=D(sh,lt),fo=d.fillOrder,N=fo.length;if(!N)return[];
  const{full,rem}=getRoundInfo(sh,lt);
  const seq=[];
  for(let r=1;r<=full;r++){
    const exNames=d.roundExtras[r]||[];
    for(const name of exNames){const pi=fo.indexOf(name);if(pi>=0)seq.push({pi,round:r,type:'extra'});}
    for(let i=0;i<N;i++)seq.push({pi:i,round:r,type:'regular'});
  }
  if(rem>0){
    const r=full+1,exNames=d.roundExtras[r]||[];
    for(const name of exNames){const pi=fo.indexOf(name);if(pi>=0)seq.push({pi,round:r,type:'extra'});}
    // Last round: lastRoundOrder + substitutes from standbyOrder
    const lrNames=[...d.lastRoundOrder,...d.standbyOrder.slice(0,d.lastRoundSubs)];
    for(const name of lrNames){const pi=fo.indexOf(name);if(pi>=0)seq.push({pi,round:r,type:'regular'});}
  }
  return seq;
}

function capTurnIndex(sh,lt){
  const seqLen=computeSeq(sh,lt).length;
  if(D(sh,lt).turnIndex>seqLen)D(sh,lt).turnIndex=seqLen;
}

function getCurEntry(sh,lt){const seq=computeSeq(sh,lt),ti=D(sh,lt).turnIndex;return ti<seq.length?seq[ti]:null;}
function curName(sh,lt){const e=getCurEntry(sh,lt);return e?nameAt(sh,lt,e.pi):'';}
function isAllDone(sh,lt){return getCurEntry(sh,lt)===null;}
function lastFill(sh,lt){const mh=D(sh,lt).history.filter(h=>h.y===state.year&&h.m===state.month);return mh.length?mh[mh.length-1]:null;}
function canUndo(sh,lt){const lf=lastFill(sh,lt);return lf&&lf.turn===D(sh,lt).turnIndex;}

// Conflict: same name booked in same lt same day, or same name booked in other lt same day
function hasConflict(sh,lt,pi,day){
  const name=nameAt(sh,lt,pi);if(!name)return false;
  if(getBks(sh,lt,day).some(b=>nameAt(sh,lt,b.pi)===name))return true;
  const other=lt==='leave'?'stay':'leave';
  return getBks(sh,other,day).some(b=>nameAt(sh,other,b.pi)===name);
}

// ── Actions ──
async function confirmFill(){
  try{
    const day=state.selectedDay;
    if(day===null){alert('請先點選日期');return;}
    const sh=state.shift,lt=state.leaveType;
    const entry=getCurEntry(sh,lt);
    if(!entry){alert('目前無法判斷填假順位，請確認填假順位是否已設定。');return;}
    const{pi,type}=entry;
    const name=nameAt(sh,lt,pi);
    if(!name){alert('找不到對應人員，請確認填假順位設定。');return;}
    if(hasConflict(sh,lt,pi,day)){
      const oN=lt==='leave'?'外宿':'休假';
      alert(name+' 在 '+(state.month+1)+'/'+day+' 已有填假紀錄（'+oN+'或同假別），無法重複！');return;
    }
    setSS('syncing');
    const{data,error}=await sb.from('bookings').insert({year:state.year,month:state.month,day,person_index:pi,turn_number:D(sh,lt).turnIndex+1,entry_type:type,shift:sh,leave_type:lt}).select();
    if(error){console.error('Supabase error:',JSON.stringify(error));alert('儲存失敗：'+JSON.stringify(error));setSS('error');return;}
    const k=bk(state.year,state.month,day);
    if(!D(sh,lt).bookings[k])D(sh,lt).bookings[k]=[];
    D(sh,lt).bookings[k].push({pi,type});
    D(sh,lt).history.push({turn:D(sh,lt).turnIndex+1,pi,y:state.year,m:state.month,d:day,type,id:data[0].id});
    D(sh,lt).turnIndex++;state.selectedDay=null;
    await saveShift(sh);
    render();
  }catch(e){
    console.error('confirmFill exception:',e);
    setSS('error');
    alert('發生錯誤：'+e.message);
  }
}

async function confirmSkip(){
  const sh=state.shift,lt=state.leaveType;
  const entry=getCurEntry(sh,lt);if(!entry)return;
  const{full,rem}=getRoundInfo(sh,lt);
  const totalR=full+(rem>0?1:0);
  const isLast=entry.round===totalR&&rem>0&&entry.type==='regular';
  let subMsg='',nextSub=null;
  if(isLast){
    const avail=D(sh,lt).standbyOrder.filter(n=>!D(sh,lt).lastRoundOrder.includes(n)).slice(D(sh,lt).lastRoundSubs);
    if(avail.length>0){nextSub=avail[0];subMsg='\n\n⇒ 將由【'+nextSub+'】自動遞補';}
    else subMsg='\n\n⚠ 已無備補人員可遞補';
  }
  if(!confirm('確定要放棄這次填假嗎？不佔用格子。'+subMsg))return;
  D(sh,lt).skips.push({turn:D(sh,lt).turnIndex+1,pi:entry.pi,y:state.year,m:state.month});
  D(sh,lt).turnIndex++;state.selectedDay=null;
  if(isLast&&nextSub){D(sh,lt).lastRoundOrder.push(nextSub);D(sh,lt).lastRoundSubs++;}
  setSS('syncing');await saveShift(sh);render();
}

async function undoLast(){
  const sh=state.shift,lt=state.leaveType;
  if(!canUndo(sh,lt))return;
  const last=lastFill(sh,lt);
  if(!confirm('確定要收回 '+nameAt(sh,lt,last.pi)+' '+( last.m+1)+'/'+last.d+' 的填假紀錄？'))return;
  setSS('syncing');
  try{
    await sb.from('bookings').delete().eq('id',last.id);
    const k=bk(last.y,last.m,last.d);
    if(D(sh,lt).bookings[k]){const idx=D(sh,lt).bookings[k].findIndex(b=>b.pi===last.pi&&b.type===last.type);if(idx>=0)D(sh,lt).bookings[k].splice(idx,1);}
    const hi=D(sh,lt).history.findIndex(h=>h.id===last.id);if(hi>=0)D(sh,lt).history.splice(hi,1);
    D(sh,lt).turnIndex--;state.selectedDay=null;
    await saveShift(sh);
  }catch(e){setSS('error');alert('撤銷失敗');}
  render();
}

async function adminRollback(sh,lt){
  const d=D(sh,lt);
  if(d.turnIndex===0){alert('已無輪次可倒退');return;}
  const lf=lastFill(sh,lt);
  const msg=lf&&lf.turn===d.turnIndex
    ?'強制倒退一步，將移除：\n'+nameAt(sh,lt,lf.pi)+' '+(lf.m+1)+'/'+lf.d
    :'強制倒退一個輪次計數（對應一次放棄紀錄）';
  if(!confirm('【管理員操作】\n'+msg+'\n\n確定執行？'))return;
  setSS('syncing');
  try{
    if(lf&&lf.turn===d.turnIndex){
      await sb.from('bookings').delete().eq('id',lf.id);
      const k=bk(lf.y,lf.m,lf.d);
      if(d.bookings[k]){const idx=d.bookings[k].findIndex(b=>b.pi===lf.pi&&b.type===lf.type);if(idx>=0)d.bookings[k].splice(idx,1);}
      const hi=d.history.findIndex(h=>h.id===lf.id);if(hi>=0)d.history.splice(hi,1);
    } else {
      // Remove last skip
      const ms=d.skips.filter(s=>s.y===state.year&&s.m===state.month);
      if(ms.length)d.skips.splice(d.skips.lastIndexOf(ms[ms.length-1]),1);
    }
    d.turnIndex--;state.selectedDay=null;
    await saveShift(sh);
  }catch(e){setSS('error');alert('操作失敗');}
  render();
}

async function resetMonth(sh,lt){
  const ltN=lt==='leave'?'休假':'外宿';
  if(!confirm('確定要重置 '+sh+'班 '+state.year+'/'+(state.month+1)+' '+ltN+' 所有資料？'))return;
  setSS('syncing');
  try{
    await sb.from('bookings').delete().eq('year',state.year).eq('month',state.month).eq('shift',sh).eq('leave_type',lt);
    const pre=state.year+'-'+state.month+'-';
    Object.keys(D(sh,lt).bookings).forEach(k=>{if(k.startsWith(pre))delete D(sh,lt).bookings[k];});
    D(sh,lt).history=D(sh,lt).history.filter(h=>!(h.y===state.year&&h.m===state.month));
    D(sh,lt).skips=D(sh,lt).skips.filter(s=>!(s.y===state.year&&s.m===state.month));
    D(sh,lt).turnIndex=0;D(sh,lt).lastRoundSubs=0;state.selectedDay=null;
    await saveShift(sh);
  }catch(e){setSS('error');}
  render();
}

function buildFill(){
  const sh=state.shift,lt=state.leaveType,y=state.year,m=state.month;
  const dim=getDIM(y,m),fd=getFD(y,m);
  const entry=getCurEntry(sh,lt),done=isAllDone(sh,lt);
  const name=done?'':curName(sh,lt);
  const isExtra=entry&&entry.type==='extra';
  const{full,rem}=getRoundInfo(sh,lt);
  const totalR=full+(rem>0?1:0),curRound=entry?entry.round:0;
  const hasUnd=canUndo(sh,lt),lastF=lastFill(sh,lt);
  const ltN=lt==='leave'?'休假':'外宿';

  let cells='';
  for(let i=0;i<fd;i++)cells+='<div class="day empty"></div>';
  for(let dd=1;dd<=dim;dd++){
    const mx=getDM(sh,lt,dd),booked=countBks(sh,lt,dd),bks=getBks(sh,lt,dd);
    const isFull=booked>=mx&&mx>0,isSel=state.selectedDay===dd;
    const isConflict=entry&&hasConflict(sh,lt,entry.pi,dd);
    let cls='day',click=false;
    if(mx===0)cls+=' zero';
    else if(isConflict)cls+=' conflict';
    else if(isSel){cls+=' sel';click=true;}
    else if(isFull)cls+=' full';
    else if(done)cls+=' locked';
    else{cls+=' avail';click=true;}
    const chips=bks.map(b=>'<div class="nchip'+(b.type==='extra'?' extra':'')+(lt==='stay'?' stay':'')+'">'+((nameAt(sh,lt,b.pi)).slice(0,3))+'</div>').join('');
    cells+='<div class="'+cls+'"'+(click?' data-day="'+dd+'"':'')+'><div class="dnum">'+dd+'</div>'+(mx>0?'<div class="dslot">'+booked+'/'+mx+'</div>':'<div class="dslot">休</div>')+(chips?'<div class="dnames">'+chips+'</div>':'')+'</div>';
  }

  const statusBox=done
    ?'<div class="info-box info-hl">🎉 本月'+ltN+'填假已完成！</div>'
    :isExtra
    ?'<div class="info-box info-warn">★ 額外插入：<strong>'+name+'</strong> 在第 '+curRound+' 輪前先填</div>'
    :'<div class="info-box info-hl"><i class="ti ti-user-check" style="vertical-align:-2px;margin-right:5px;"></i>現在輪到：<strong>'+name+'</strong>（第 '+curRound+'/'+totalR+' 輪'+(curRound===totalR&&rem>0?' · 最後一輪':'')+'）</div>';

  return '<div class="lt-bar"><button class="lt-btn'+(lt==='leave'?' active':'')+'" data-lt="leave">休假</button><button class="lt-btn'+(lt==='stay'?' active':'')+'" data-lt="stay">外宿</button></div>'
    +statusBox
    +'<div class="section"><div class="slabel">'+y+' 年 '+MONTHS[m]+' — '+ltN+'</div>'
    +'<div class="cal-grid">'+DAYS.map(d2=>'<div class="dh">'+d2+'</div>').join('')+cells+'</div>'
    +'<div class="legend"><span><div class="dsq" style="background:#dbeafe;border:1px solid #93c5fd;"></div>已填</span><span><div class="dsq" style="background:#f0fdf4;border:1px solid #bbf7d0;"></div>額滿</span><span><div class="dsq" style="background:#fef2f2;border:1px solid #fca5a5;"></div>衝突</span></div></div>'
    +(!done?'<div class="confirm-area"><div class="slabel">已選擇</div>'
      +'<div class="selected-display'+(state.selectedDay===null?' empty':'')+'">'+( state.selectedDay!==null?(m+1)+'/'+state.selectedDay+'（'+DAYS[new Date(y,m,state.selectedDay).getDay()]+'）':'尚未選擇，請點選日曆')+'</div>'
      +'<button class="btn-primary" id="confirm-fill"'+(state.selectedDay===null?' disabled':'')+'>確認填假 — '+name+(isExtra?' ★ 額外':'')+'</button>'
      +'<button class="btn-skip" id="confirm-skip"><i class="ti ti-user-x" style="vertical-align:-2px;margin-right:4px;"></i>放棄填假（跳過 '+name+'，不佔格子）</button>'
      +(hasUnd&&lastF?'<button class="btn-undo" id="undo-fill"><i class="ti ti-arrow-back-up" style="vertical-align:-2px;margin-right:4px;"></i>反悔收回：'+nameAt(sh,lt,lastF.pi)+' '+(lastF.m+1)+'/'+lastF.d+'</button>':'')
      +'</div>':'');
}

// ── View ──
function buildView(){
  const sh=state.shift,y=state.year,m=state.month;
  let html='<div class="top-actions"><button class="btn" id="refresh-btn"><i class="ti ti-refresh" style="vertical-align:-2px;margin-right:4px;"></i>重新整理</button><button class="btn btn-excel" id="export-excel"><i class="ti ti-file-spreadsheet" style="vertical-align:-2px;margin-right:4px;"></i>匯出 Excel</button></div>';
  for(const lt of['leave','stay']){
    const ltN=lt==='leave'?'休假':'外宿',ltC=lt==='leave'?'#2563eb':'#7c3aed';
    const dim=getDIM(y,m);
    const total=Array.from({length:dim},(_,i)=>getDM(sh,lt,i+1)).reduce((a,b)=>a+b,0);
    const used=Array.from({length:dim},(_,i)=>countBks(sh,lt,i+1)).reduce((a,b)=>a+b,0);
    const mh=D(sh,lt).history.filter(h=>h.y===y&&h.m===m);
    const ms=D(sh,lt).skips.filter(s=>s.y===y&&s.m===m);
    const entry=getCurEntry(sh,lt),ci=entry?entry.pi:-1;
    const allEv=[...mh.map(h=>({...h,ev:'fill'})),...ms.map(s=>({turn:s.turn,pi:s.pi,ev:'skip'}))].sort((a,b)=>a.turn-b.turn);
    html+='<div style="border-left:3px solid '+ltC+';padding-left:10px;margin-bottom:20px;">'
      +'<div class="lt-section-title">'+ltN+'</div>'
      +'<div class="grid2"><div class="metric"><div class="metric-label">總格數</div><div class="metric-val">'+total+'</div></div><div class="metric"><div class="metric-label">已填</div><div class="metric-val">'+used+'</div></div></div>'
      +'<div class="section"><div class="slabel">人員狀況</div>'
      +D(sh,lt).fillOrder.map((name,pi)=>{
        const days=mh.filter(h=>h.pi===pi&&h.type==='regular').length;
        const ext=mh.filter(h=>h.pi===pi&&h.type==='extra').length;
        const skipped=ms.filter(s=>s.pi===pi).length;
        let sl,sc;
        if(entry&&pi===ci){sl=entry.type==='extra'?'額外插入中':'目前輪到';sc=entry.type==='extra'?'ps-extra':'ps-now';}
        else if(days>0||ext>0){sl=days+'天'+(ext>0?' +'+ext+'額':'')+(skipped>0?' (棄'+skipped+')':'');sc='ps-done';}
        else if(skipped>0){sl='放棄'+skipped+'次';sc='ps-skip';}
        else{sl='等待中';sc='ps-wait';}
        return '<div class="card person-row"><div class="rank">'+(pi+1)+'</div><span class="pname">'+name+'</span><span class="ps '+sc+'">'+sl+'</span></div>';
      }).join('')+'</div>'
      +'<div class="section"><div class="slabel">歷程</div>'
      +(allEv.length===0?'<div class="info-box">尚無紀錄</div>':'<div class="card" style="padding:8px 14px;">'
        +allEv.map(ev=>{
          if(ev.ev==='skip')return '<div class="history-row"><span class="tnum">#'+ev.turn+'</span><span style="font-weight:500;min-width:60px;color:#dc2626;">'+nameAt(sh,lt,ev.pi)+'</span><span style="color:#dc2626;font-size:13px;">放棄</span></div>';
          return '<div class="history-row"><span class="tnum">#'+ev.turn+'</span><span style="font-weight:500;min-width:60px;">'+nameAt(sh,lt,ev.pi)+'</span><span style="color:#888;font-size:13px;">'+(ev.m+1)+'/'+ev.d+'（'+DAYS[new Date(ev.y,ev.m,ev.d).getDay()]+'）</span>'+(ev.type==='extra'?'<span class="ps ps-extra" style="margin-left:auto;">額外</span>':'')+'</div>';
        }).join('')+'</div>')
      +'</div></div>';
  }
  return html;
}

// ── Events ──
function bindEvents(){
  const sh=state.shift;
  document.querySelectorAll('[data-shift]').forEach(b=>b.addEventListener('click',()=>{state.shift=b.dataset.shift;state.selectedDay=null;render();}));
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{state.tab=b.dataset.tab;state.selectedDay=null;render();}));
  document.querySelectorAll('[data-lt]').forEach(b=>b.addEventListener('click',()=>{state.leaveType=b.dataset.lt;state.selectedDay=null;render();}));
  const pm=document.getElementById('prev-month');
  if(pm)pm.addEventListener('click',async()=>{if(state.month===0){state.month=11;state.year--;}else state.month--;state.selectedDay=null;for(const s of['A','B'])await saveShift(s);render();});
  const nm=document.getElementById('next-month');
  if(nm)nm.addEventListener('click',async()=>{if(state.month===11){state.month=0;state.year++;}else state.month++;state.selectedDay=null;for(const s of['A','B'])await saveShift(s);render();});
  document.querySelectorAll('[data-qd]').forEach(b=>b.addEventListener('click',async()=>{
    const bsh=b.dataset.sh,blt=b.dataset.lt,dd=parseInt(b.dataset.qd),delta=parseInt(b.dataset.delta);
    setDM(bsh,blt,dd,getDM(bsh,blt,dd)+delta);render();await saveShift(bsh);
  }));
  document.querySelectorAll('[data-bapsh]').forEach(b=>b.addEventListener('click',async()=>{
    const bsh=b.dataset.bapsh,blt=b.dataset.baplt,v=parseInt(document.getElementById('bv-'+bsh+'-'+blt).value)||0;
    const dim=getDIM(state.year,state.month);for(let dd=1;dd<=dim;dd++)setDM(bsh,blt,dd,v);
    render();await saveShift(bsh);
  }));
  // People
  function addPersonToShift(bsh,n){
    if(!n)return;
    if(!state[bsh].people.includes(n))state[bsh].people.push(n);
    for(const lt of['leave','stay']){
      if(!D(bsh,lt).fillOrder.includes(n))D(bsh,lt).fillOrder.push(n);
      if(!D(bsh,lt).lastRoundOrder.includes(n)&&!D(bsh,lt).standbyOrder.includes(n))D(bsh,lt).standbyOrder.push(n);
    }
  }
  function removePersonFromShift(bsh,n){
    state[bsh].people=state[bsh].people.filter(x=>x!==n);
    for(const lt of['leave','stay']){
      const d=D(bsh,lt);
      const pi=d.fillOrder.indexOf(n);
      d.fillOrder=d.fillOrder.filter(x=>x!==n);
      d.lastRoundOrder=d.lastRoundOrder.filter(x=>x!==n);
      d.standbyOrder=d.standbyOrder.filter(x=>x!==n);
      for(const r in d.roundExtras)d.roundExtras[r]=(d.roundExtras[r]||[]).filter(x=>x!==n);
    }
  }
  const ap=document.getElementById('add-person');
  if(ap)ap.addEventListener('click',async()=>{
    const inp=document.getElementById('new-person');const n=inp&&inp.value.trim();if(!n)return;
    addPersonToShift(sh,n);
    if(inp)inp.value='';render();await saveShift(sh);
  });
  // Delete person from shift
  document.querySelectorAll('[data-delppl]').forEach(b=>b.addEventListener('click',async()=>{
    const i=parseInt(b.dataset.delppl),n=state[sh].people[i];
    if(!n)return;
    if(!confirm('確定要將「'+n+'」從 '+sh+'班名單移除嗎？\n（不影響已填假紀錄）'))return;
    removePersonFromShift(sh,n);render();await saveShift(sh);
  }));
  // Add from roster
  document.querySelectorAll('[data-rosteradd]').forEach(b=>b.addEventListener('click',async()=>{
    addPersonToShift(b.dataset.rostersh,b.dataset.rosteradd);render();await saveShift(b.dataset.rostersh);
  }));
  // Roster management
  const ar=document.getElementById('add-roster');
  if(ar)ar.addEventListener('click',async()=>{
    const inp=document.getElementById('new-roster');const n=inp&&inp.value.trim();if(!n)return;
    if(!state.roster.includes(n))state.roster.push(n);
    if(inp)inp.value='';render();await saveShift(sh);
  });
  document.querySelectorAll('[data-rosterdel]').forEach(b=>b.addEventListener('click',async()=>{
    const i=parseInt(b.dataset.rosterdel);
    state.roster.splice(i,1);render();await saveShift(sh);
  }));
  // Last round checkboxes
  document.querySelectorAll('[data-lrname]').forEach(cb=>cb.addEventListener('change',async()=>{
    const bsh=cb.dataset.lrsh,blt=cb.dataset.lrlt,name=cb.dataset.lrname;
    if(cb.checked){
      D(bsh,blt).lastRoundOrder.push(name);
      D(bsh,blt).standbyOrder=D(bsh,blt).standbyOrder.filter(n=>n!==name);
    } else {
      D(bsh,blt).lastRoundOrder=D(bsh,blt).lastRoundOrder.filter(n=>n!==name);
      if(!D(bsh,blt).standbyOrder.includes(name))D(bsh,blt).standbyOrder.push(name);
    }
    render();await saveShift(bsh);
  }));
  // Extras
  document.querySelectorAll('[data-addexsh]').forEach(b=>b.addEventListener('click',async()=>{
    const bsh=b.dataset.addexsh,blt=b.dataset.addexlt,r=parseInt(b.dataset.addexr);
    const sel=document.getElementById('esel-'+bsh+'-'+blt+'-'+r);if(!sel)return;
    if(!D(bsh,blt).roundExtras[r])D(bsh,blt).roundExtras[r]=[];
    D(bsh,blt).roundExtras[r].push(sel.value);
    capTurnIndex(bsh,blt);render();await saveShift(bsh);
  }));
  document.querySelectorAll('[data-exsh]').forEach(b=>b.addEventListener('click',async()=>{
    const bsh=b.dataset.exsh,blt=b.dataset.exlt,r=parseInt(b.dataset.exr),ei=parseInt(b.dataset.exei);
    D(bsh,blt).roundExtras[r].splice(ei,1);
    capTurnIndex(bsh,blt);render();await saveShift(bsh);
  }));
  document.querySelectorAll('[data-resetsh]').forEach(b=>b.addEventListener('click',()=>resetMonth(b.dataset.resetsh,b.dataset.resetlt)));
  document.querySelectorAll('[data-rbsh]').forEach(b=>b.addEventListener('click',()=>adminRollback(b.dataset.rbsh,b.dataset.rblt)));
  // Rank list sort
  document.querySelectorAll('[data-rlid]').forEach(btn=>btn.addEventListener('click',async()=>{
    const listId=btn.dataset.rlid,bsh=btn.dataset.rlsh,blt=btn.dataset.rllt,field=btn.dataset.rlfield;
    const listEl=document.getElementById(listId);if(!listEl)return;
    const items=[...listEl.querySelectorAll('.rank-item')];
    const pairs=items.map(item=>{
      const name=item.querySelector('.rank-item-name').textContent;
      const num=parseFloat(item.querySelector('.rank-num-input').value)||0;
      return{name,num};
    });
    pairs.sort((a,b)=>a.num-b.num);
    const sorted=pairs.map(p=>p.name);
    if(field==='people'){state[bsh].people=sorted;}
    else{D(bsh,blt)[field]=sorted;}
    render();await saveShift(bsh);
  }));
  // Fill
  document.querySelectorAll('[data-day]').forEach(c=>c.addEventListener('click',()=>{
    const d=parseInt(c.dataset.day);state.selectedDay=state.selectedDay===d?null:d;render();
  }));
  const cf=document.getElementById('confirm-fill');if(cf)cf.addEventListener('click',confirmFill);
  const cs=document.getElementById('confirm-skip');if(cs)cs.addEventListener('click',confirmSkip);
  const cu=document.getElementById('undo-fill');if(cu)cu.addEventListener('click',undoLast);
  const rfr=document.getElementById('refresh-btn');if(rfr)rfr.addEventListener('click',()=>{state.loading=true;render();loadDB();});
  const ee=document.getElementById('export-excel');if(ee)ee.addEventListener('click',exportExcel);
}

// ── Excel ──
function exportExcel(){
  const sh=state.shift,y=state.year,m=state.month,dim=getDIM(y,m);
  const wb=XLSX.utils.book_new();
  for(const lt of['leave','stay']){
    const ltN=lt==='leave'?'休假':'外宿';
    const c=[['日期','星期','已填人員（一般）','額外人員','已填','上限']];
    for(let dd=1;dd<=dim;dd++){
      const dow=new Date(y,m,dd).getDay(),bks=getBks(sh,lt,dd);
      const reg=bks.filter(b=>b.type==='regular').map(b=>nameAt(sh,lt,b.pi)).join('、');
      const ext=bks.filter(b=>b.type==='extra').map(b=>nameAt(sh,lt,b.pi)).join('、');
      c.push([y+'/'+(m+1)+'/'+dd,DAYS[dow],reg,ext,bks.length,getDM(sh,lt,dd)]);
    }
    const ws=XLSX.utils.aoa_to_sheet(c);ws['!cols']=[{wch:12},{wch:6},{wch:24},{wch:14},{wch:6},{wch:6}];
    XLSX.utils.book_append_sheet(wb,ws,(m+1)+'月'+ltN);
  }
  const sc=[['假別','填假順位','姓名','填假天數','額外','放棄']];
  for(const lt of['leave','stay']){
    const ltN=lt==='leave'?'休假':'外宿';
    const mh=D(sh,lt).history.filter(h=>h.y===y&&h.m===m);
    const ms=D(sh,lt).skips.filter(s=>s.y===y&&s.m===m);
    D(sh,lt).fillOrder.forEach((name,pi)=>{
      sc.push([ltN,pi+1,name,mh.filter(h=>h.pi===pi&&h.type==='regular').length,mh.filter(h=>h.pi===pi&&h.type==='extra').length,ms.filter(s=>s.pi===pi).length]);
    });
  }
  const ws2=XLSX.utils.aoa_to_sheet(sc);ws2['!cols']=[{wch:6},{wch:8},{wch:10},{wch:10},{wch:6},{wch:6}];
  XLSX.utils.book_append_sheet(wb,ws2,'人員統計');
  XLSX.writeFile(wb,'填假紀錄_'+sh+'班_'+y+'年'+(m+1)+'月.xlsx');
}

loadDB();
</script>
